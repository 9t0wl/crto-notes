const nav=document.getElementById('nav'),cw=document.getElementById('content-wrap'),se=document.getElementById('search'),bc=document.getElementById('bc'),lc=document.getElementById('lc'),labct=document.getElementById('labct');
labct.textContent=N.length;lc.textContent=N.length+' modules';
let cur=null;

function buildNav(f=''){
  nav.innerHTML='';
  const q=f.toLowerCase().trim();
  const cats=[...new Set(N.map(n=>n.cat))];
  let shown=0;
  cats.forEach(cat=>{
    const items=N.filter(n=>n.cat===cat&&(q===''||n.title.toLowerCase().includes(q)||n.short.toLowerCase().includes(q)||n.c.toLowerCase().includes(q)||n.m.some(m=>m.toLowerCase().includes(q))));
    if(!items.length)return;
    const h=document.createElement('div');h.className='cat-header';h.textContent=cat;nav.appendChild(h);
    items.forEach(note=>{
      shown++;
      const el=document.createElement('div');el.className='nav-item';el.dataset.id=note.id;
      el.innerHTML='<div class="dot"></div><span>'+note.short+'</span>';
      el.addEventListener('click',()=>show(note.id));
      nav.appendChild(el);
    });
  });
  if(!shown)nav.innerHTML='<div id="noresults">no results for "'+f+'"</div>';
}

function md(s){
  let h=s.replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`([^`\n]+)`/g,'<code>$1</code>').replace(/^---$/gm,'<hr>');
  h=h.replace(/```[\w]*\n([\s\S]*?)```/g,(_,c)=>'<div class="cb"><pre>'+c.replace(/</g,'&lt;').replace(/>/g,'&gt;').trimEnd()+'</pre><button class="cpbtn" onclick="cp(this)">COPY</button></div>');
  const ls=h.split('\n');let o='',ul=false,tbl=false,tls=[];
  ls.forEach((l,i)=>{
    if(l.match(/^\|/)){if(!tbl){tbl=true;tls=[];}tls.push(l);const nx=ls[i+1];if(!nx||!nx.match(/^\|/)){o+=rt(tls);tbl=false;tls=[];}return;}
    if(l.startsWith('<h')||l.startsWith('<blockquote')||l.startsWith('<hr')||l.startsWith('<div class="cb')){if(ul){o+='</ul>';ul=false;}o+=l;}
    else if(/^[-*] /.test(l)){if(!ul){o+='<ul>';ul=true;}o+='<li>'+l.replace(/^[-*] /,'')+'</li>';}
    else if(!l.trim()){if(ul){o+='</ul>';ul=false;}}
    else{if(ul){o+='</ul>';ul=false;}o+='<p>'+l+'</p>';}
  });
  if(ul)o+='</ul>';return o;
}

function rt(ls){
  let h='<table>';
  ls.forEach((l,i)=>{if(i===1)return;const cs=l.split('|').filter((_,j,a)=>j>0&&j<a.length-1),t=i===0?'th':'td';h+=`<tr>${cs.map(c=>`<${t}>${c.trim()}</${t}>`).join('')}</tr>`;});
  return h+'</table>';
}

function show(id){
  const note=N.find(n=>n.id===id);if(!note)return;cur=id;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  bc.textContent=note.short;
  cw.innerHTML=`<div class="note-title">${note.title.toUpperCase()}</div><div class="note-meta"><span class="sect">${note.cat}</span>${note.m.map(m=>`<span class="mt">${m}</span>`).join(' ')}</div><div class="note-body">${md(note.c)}</div>`;
  cw.scrollTop=0;
}

window.cp=function(btn){
  const t=btn.previousElementSibling.textContent;
  const done=()=>{btn.textContent='COPIED ✓';btn.classList.add('ok');setTimeout(()=>{btn.textContent='COPY';btn.classList.remove('ok');},2000);};
  navigator.clipboard?navigator.clipboard.writeText(t).then(done).catch(()=>{const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);done();}):done();
};

se.addEventListener('input',e=>{buildNav(e.target.value);if(!e.target.value.trim()&&cur){document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.id===cur));}});
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();se.focus();se.select();}if(e.key==='Escape')se.blur();});
buildNav();
</script>
